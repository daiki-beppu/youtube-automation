# automation リポジトリの takt 設定
# provider / model / language はグローバル設定 (~/.takt/config.yaml) を継承する。
# takt は全 persona codex で運用する（レビュー系も codex。lite workflow は step 直指定でも codex を明示）。
draft_pr: false
base_branch: main

provider: codex
persona_providers:
  coder:
    provider: codex
  planner:
    provider: codex

# sandbox 化された worker の direnv / lefthook セットアップ停滞対策（issue #1999）。
# runtime-prepare.sh の stdout（KEY=VALUE）が全 worker の環境へ注入され、
# XDG_DATA_HOME を worktree ローカルへ向けて direnv allow を通し、
# lefthook install はスキップさせる（ゲートは CI 側で担保）。
runtime:
  prepare:
    - .takt/runtime-prepare.sh

# トークン消費の計測。記録先: .takt/runs/<run>/logs/<session>-usage-events.phase.jsonl
observability:
  enabled: true
  usage_events_phase: true
