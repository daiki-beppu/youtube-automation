# automation リポジトリの takt 設定
# provider / model / language はグローバル設定 (~/.takt/config.yaml) を継承
draft_pr: false
base_branch: feat/ts-rewrite  # cutover まで ts-rewrite 向け (元: main)

# 全 persona を claude-terminal/opus に統一。
# claude (SDK) だと reviewer が "Timed out waiting for Claude terminal session id" で落ちるため、
# 全ペルソナを claude-terminal に揃える。
persona_providers:
  planner:
    provider: claude-terminal
    model: opus
  coder:
    provider: claude-terminal
    model: opus
  architecture-reviewer:
    provider: claude-terminal
    model: opus
  ai-antipattern-reviewer:
    provider: claude-terminal
    model: opus
  pure-review:
    provider: claude-terminal
    model: opus
  pure-reviewer:
    provider: claude-terminal
    model: opus
  coding-review:
    provider: claude-terminal
    model: opus
  coding-reviewer:
    provider: claude-terminal
    model: opus
  supervisor:
    provider: claude-terminal
    model: opus
