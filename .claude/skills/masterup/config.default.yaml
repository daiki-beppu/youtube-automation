# masterup skill default config
#
# マスター音源生成 + Suno CDN ダウンロード + マスター整音の設定。
# チャンネル側では config/skills/masterup.yaml に上書き値を置く。

audio:
  # トラック間クロスフェード秒数
  # yt-generate-master の ffmpeg acrossfade と metadata_generator.py の
  # タイムスタンプ計算の両方がこの値を参照する。
  crossfade_duration: 1.0

  # マスター音源のビットレート (yt-generate-master と yt-finalize-master で共有)。
  # `audio.finalize.bitrate` が明示指定されていればそちらが yt-finalize-master の出力に勝つ。
  bitrate: "192k"

  # CLI フラグ (`--loop` / `--target-duration`) が両方未指定のときに
  # `yt-generate-master --target-duration MIN` 相当のデフォルト値として使われる。
  # 同梱デフォルトでは未設定 (= 1 ループで終了)。チャンネル側で opt-in する。
  # target_duration_min: 120

  # CLI フラグ (`--shuffle` / `--shuffle-seed`) のいずれも未指定のときに
  # `yt-generate-master --shuffle` 相当のデフォルトとして採用される。
  # Suno で同一プロンプトから生成した類似イントロ群が連続するのを避けたいときに有効化する。
  # 同梱デフォルトでは未設定 (= シャッフルしない)。チャンネル側で opt-in する。
  # shuffle: true

  # `audio.shuffle: true` のときに採用される再現性 seed (整数)。
  # CLI `--shuffle-seed` 未指定時のフォールバックとして使われる。
  # 単独設定 (`shuffle: true` を伴わない) では shuffle を有効化しない。
  # shuffle_seed: 42

  # CLI フラグ (`--pin-first` / `--pin-first-count`) のいずれも未指定のときに
  # `yt-generate-master --pin-first-count N` 相当のデフォルトとして採用される。
  # ソート済み先頭 N 件を順序固定し、`audio.shuffle: true` と併用すると残りだけ
  # シャッフルされる。Suno で retention に強い 1 曲を冒頭に置きたい運用向け。
  # 既定 0 = 固定なし。
  pin_first_count: 0

  # yt-finalize-master の整音パイプライン設定 (#512)。
  # branding/<dirname>/<glob> に該当ファイルが 1 件以上ある場合のみ有効。
  # 全項目に組み込みデフォルトがあり、未設定でも既存 v5.5.0 と同じ挙動になる。
  # finalize:
  #   # 出力エンコード (audio.bitrate / libmp3lame / ffmpeg 既定 sr を上書き)
  #   bitrate: "192k"            # 出力ビットレート (未指定なら audio.bitrate を流用)
  #   codec: "libmp3lame"        # ffmpeg -c:a に渡すコーデック
  #   sample_rate: 44100         # ffmpeg -ar に渡すサンプリングレート (未指定で master 由来)
  #
  #   ambient_layers:
  #     dirname: "rain_layers"   # branding/<dirname>/ 直下を探索
  #     glob: "rain_*.wav"       # <dirname>/ 内の対象ファイル glob
  #     volume_db: -19           # 全レイヤー共通の音量 dB
  #     fadein_s: 0.5            # 頭の不連続抑制 (afade)
  #     fadein_curve: "tri"      # afade の curve (tri/exp/log/qsin/hsin/esin/cub/squ/par 等)
  #     layers:                  # per-file 上書き (ファイル名 → 部分上書き dict)
  #       rain_001.wav:
  #         volume_db: -22        # この 1 ファイルだけ音量を下げる
  #       rain_002.wav:
  #         fadein_s: 1.5
  #         fadein_curve: "exp"
  #
  #   loudnorm:
  #     enabled: true            # false で pass1/pass2 を skip し amix 単発で encode
  #     mode: "linear"           # 'linear' (two-pass) のみサポート。'dynamic' は NotImplementedError
  #     I: -14                   # integrated loudness 目標 (LUFS)
  #     LRA: 11                  # loudness range 目標
  #     TP: -1.5                 # true peak 目標 (dBTP)
  #
  #   mix:
  #     duration: "first"        # ffmpeg amix duration (first/shortest/longest)
  #     normalize: 0             # ffmpeg amix normalize (0=disabled, 1=enabled, true/false 可)

# Suno CDN ダウンロード設定
suno_download:
  cdn_url_template: "https://cdn1.suno.ai/{song_id}.mp3"

  # curl の --retry / --retry-delay に渡す値。
  # CDN が一時的に 5xx を返す場合やネットワーク不安定時に調整する。
  retry_count: 3
  retry_delay_seconds: 2

# Suno 1 Generate = 2 clip の採用整理。
# /suno-helper が全 clip を 02-Individual-music/ に配置した後、/masterup が
# yt-generate-master の直前に実行する。
pair_selection:
  # auto: suno-prompts.json の lyrics から歌詞あり/なしを判定する。
  #   - 歌詞あり: 同名タイトル / prompt entry ごとに 1 clip だけ winner 採用
  #   - 歌詞なし: 同じ prompt から出た 2 clip を両方採用
  # never: 採用整理をスキップし、02-Individual-music/ 直下の音源をそのまま使う。
  mode: auto

  # winner 選定戦略。初版は random のみ。
  strategy: random
  # null なら実行ごとに seed を生成し、01-master/.selection.log に記録する。
  random_seed: null

  # 極端に短い曲 / 長い曲は master から除外する。
  # Suno の失敗生成（数秒で終わる、5 分超で崩れる等）を master に混ぜないための guard。
  # null で片側だけ無効化できる。
  min_song_sec: 45
  max_song_sec: 300
  out_of_range_action: stock # stock | delete

  selection_log_path: "01-master/.selection.log"

stock:
  dir: "assets/stock/music/b-side"
  filename_template: "{collection_slug}__{song_id}__{title_slug}.{ext}"
  on_duplicate: skip # skip | overwrite | fail

# 雨音レイヤー設定 (DEPRECATED, #512)
# `audio.finalize.ambient_layers` へ移行してください。
# 旧 `rain_layer` namespace は後方互換 alias として読み続けますが、
# 利用するとプロセス起動時に DeprecationWarning が出ます。
# 同時設定の場合は `audio.finalize.*` が優先され、`rain_layer` は無視されます。
# rain_layer:
#   volume_db: -19         # → audio.finalize.ambient_layers.volume_db
#   fadein_s: 0.5          # → audio.finalize.ambient_layers.fadein_s
#   loudnorm:              # → audio.finalize.loudnorm
#     I: -14
#     LRA: 11
#     TP: -1.5

# raw master への雨レイヤー後処理 (opt-in / yt-apply-rain-layers が参照)
#
# `yt-finalize-master` (rain_layer namespace) が master.mp3 を loudnorm 二段で
# in-place 上書きするのに対し、こちらは raw master (master.mp3) と
# `branding/rain_layers/*.wav` を amix で合成して別ファイル (master-rain.wav)
# に書き出す軽い後処理。後段で外部 DAW のミキシング+マスタリングを挟む運用向け。
# 成功時に workflow-state.json の assets.raw_master を output_name へ切り替える。
#
# post_processing:
#   suno_audio_cleanup:
#     enabled: false              # opt-in。true なら /masterup の Suno DL 後に yt-suno-audio-cleanup apply を実行
#     backup_originals: true      # 02-Individual-music/originals-pre-cleanup/ に元ファイルを保存
#     bitrate: "192k"             # libmp3lame 出力ビットレート (未指定なら audio.bitrate)
#     codec: "libmp3lame"
#     trim_silence:
#       enabled: true             # 冒頭無音を silenceremove でカット
#       threshold_db: -50
#     eq:
#       enabled: true             # 350Hz のもやつき / 8kHz 以上のシャリつきを軽く抑える
#       muddiness_freq_hz: 350
#       muddiness_gain_db: -2
#       harshness_freq_hz: 8000
#       harshness_gain_db: -1.5
#     volume_smoothing: true      # dynaudnorm で曲中の音量ムラを緩和
#     limiter:
#       enabled: true             # alimiter で瞬間ピークを抑制
#       limit: 0.95
#     loudnorm:
#       enabled: true             # YouTube 向け LUFS 正規化
#       I: -14
#       LRA: 11
#       TP: -1.5
#     tail_fade_guard:
#       enabled: true             # 後半崩れ対策として末尾に短い fade-out guard を入れる
#       fade_sec: 3
#
#   rain_layers:
#     enabled: false              # opt-in (true にしないと yt-apply-rain-layers は何もしない)
#     volume_db: -19              # 各レイヤーに当てる減衰 dB (10^(-19/20) ≈ 0.112)
#     output_name: master-rain.wav # 出力ファイル名 (01-master/ 配下)
#     output_codec: pcm_s16le      # 出力 ffmpeg コーデック (PCM 16-bit)
#     output_sample_rate: 44100    # 出力サンプリングレート (Hz) / stereo 固定
