# video-analyze skill default config
#
# Gemini で YouTube 動画を直接解析するスキル (Issue #103) の動作パラメータ。
# チャンネル側では config/skills/video-analyze.yaml に上書き値を置く。

# Gemini モデル名 (動画入力対応モデルを指定)
model: gemini-2.5-flash

# API レート制限対策の動画間ウェイト (秒)
delay_sec: 10

# 解析対象のクリップ窓 (秒)。動画冒頭からこの秒数だけを Gemini に渡す。
# BGM チャンネルの長尺 Complete Collection は 1〜3 時間あるが、抽出したい
# 主要データ (hook_structure / bgm_arc.intro / 序盤 scene_timeline) は冒頭
# 2〜3 曲相当に集中するため、既定 900 秒 (15 分) に絞ってコストを抑える。
# 曲数が多い・イントロが長いチャンネルは config/skills/video-analyze.yaml で上書き可。
analysis_window_sec: 900

# Gemini に渡すプロンプト。チャンネルのジャンル/世界観に合わせて
# config/skills/video-analyze.yaml で上書きを推奨。
#
# 出力 JSON はトップレベルにジャンル横断のドメインキーを置き、CLI 側で
# video_id / slug / url / title / analyzed_at / model を後付けする。
#
# `suno_preset` は SunoAI プロンプト生成 (`/suno`) の初期推奨値として
# `yt-generate-suno` が config/skills/suno.yaml 空欄時の fallback で参照する。
prompt: |
  Analyze the opening clip window of this YouTube video as a music channel content audit.
  Only the beginning of the video is provided as a fixed-length clip window — scope ALL
  observations, timestamps, and averages to this clip window. Never emit timestamps
  beyond the end of the provided clip, and do not speculate about the rest of the video.
  Return ONLY valid JSON (no markdown, no code fences) with this exact shape:
  {
    "hook_structure": {
      "intro_sec": <number>,
      "first_text_at": <number>,
      "cuts_in_first_30s": <number>,
      "signature_elements": ["list", "of", "visual", "elements", "shown", "in", "first 30s"]
    },
    "bgm_arc": {
      "intro": "timestamp range (e.g. 0:00-0:15)",
      "peak": "timestamp of the highest-energy moment within the clip window (e.g. 1:30)",
      "outro": "timestamp range of the final section within the clip window (e.g. 13:30-end of clip)",
      "energy_curve": "brief description of dynamics within the clip window"
    },
    "scene_timeline": [
      {"start": "0:00", "summary": "one-line description of what changes (clip window only)"}
    ],
    "thumbnail_alignment": {
      "signature_present": <bool>,
      "color_palette_match": <bool>,
      "notes": "what was promised by thumbnail vs delivered in the clip window"
    },
    "editing_metrics": {
      "avg_cut_sec": <number, averaged over the clip window>,
      "text_per_min": <number, averaged over the clip window>,
      "transition_style": "brief description"
    },
    "suno_preset": {
      "genre_line": "comma-separated music style phrases (5-8 phrases summarizing observed BGM instruments, tempo, and mood at a granularity Suno can reproduce — e.g. 'lo-fi jazz, soft piano, warm rhodes, mellow drums, vinyl warmth')",
      "exclude_styles": "comma-separated words SunoAI tends to mis-add but which are absent from this video (e.g. 'heavy metal, EDM, dubstep, techno, vocals, rain sounds')",
      "rationale": "1-2 sentences grounded in bgm_arc — must not contradict observed dynamics"
    }
  }
