# loop-video skill default config
#
# Veo 3.1 ループ動画生成の設定。
# チャンネル側では config/skills/loop-video.yaml に上書き値を置く。

# このチャンネルでループ動画化を行うか。false にすると yt-generate-loop-video は
# fail-loud で停止し（Veo 課金を防ぐ）、/videoup は静止画背景に切り替える。
# サムネが完成しておりループ動画のリターンが Veo コストに見合わないチャンネルで false にする。
enabled: true

# 通常生成で既存 loop.mp4 を loop-v{n}.mp4 へ退避するときの保持上限。
# 上限超過時は番号が最も小さい（最も古い）バックアップから自動削除する。
max_backups: 3

veo:
  # Veo モデル ID（API デフォルト: veo-3.1-fast-generate-001 / 選択肢: veo-3.1-fast-generate-001 | veo-3.1-generate-001 | veo-3.1-lite-generate-preview）
  model: "veo-3.1-fast-generate-001"

  # 動画生成プロンプト（freeform）。コレクションの世界観に合わせてチャンネル側で上書き推奨。
  # 原則: 静止構図 + 微細な動き（ロウソクの揺らぎ、キャラの呼吸、光のシフト）。
  # 派手なエフェクト / 煙 / パーティクル / 落下物は NG（ループ破綻の原因）。
  # 構造化プロンプト (motion_targets / static_targets) を使うほうが事故率が下がるため
  # 新規チャンネルは下の structured 系を優先して使うことを推奨。
  default_prompt: |
    Static scene with only natural subtle movements: gentle flickering of candle flames,
    slight sway of character breathing, soft light shifts on surfaces.
    No smoke, no magical effects, no particles, no falling objects.
    Keep the scene calm and grounded, like a living painting.

  # 構造化プロンプト (issue #358)。
  # 「動かす対象」「固定対象」をリストで明示し、Veo 3.1 公式推奨の
  # ポジティブ表現テンプレートに展開する。motion_targets / static_targets の
  # いずれかが非空なら default_prompt より優先される。
  # 推奨: 数や形を保持したい要素は "two animals (count remains 2)" のように
  # 肯定文で固定する書き方が効く。
  # 動きの強度は motion_targets の文言のみで制御する (issue #1747)。
  # 静かな動きなら "subtle steam rising from coffee" のように強度語を対象側に含め、
  # はっきり動かすなら "clearly rolling ocean waves" のように書く（テンプレは強度を付加しない）。
  motion_targets: []         # 例: ["slow leaves swaying", "subtle steam rising from coffee"]
  static_targets: []         # 例: ["the character", "two animals (count remains 2)", "bird bath"]

  # Veo 3.1 公式の 5 要素 (Cinematography + Action + Style) を圧縮し、
  # ポジティブ表現で「存在の固定」を明示するテンプレート。
  # {motion_clause} / {static_clause} / {base_rules} がプレースホルダ。
  # 強度断定（subtle 等）はテンプレに書かない — motion_targets の指定と矛盾し
  # Veo がほぼ静止画を返す原因になる (issue #1747)。
  prompt_template: |
    Locked camera, static composition, no camera movement.
    The scene is a living painting: {static_clause} remain exactly as in the source image — same count, same shape, same position, perfectly still.
    The only motion is {motion_clause}.
    {base_rules}
    Loop seamlessly with the first frame matching the last frame.

  # 共通の追加ルール（{base_rules} に差し込む）。ポジティブ表現でアンビエンス固定。
  base_rules: |
    Preserve the original lighting, color palette, depth, and framing.
    No new objects, no new creatures, no smoke or magical particles appear; the world is closed and stable.

  # 生成尺（Veo API 制約で現状 8 秒固定）
  duration_seconds: 8

  # FFmpeg ループ補正のクロスフェード秒数
  crossfade_sec: 0.5

# Veo 出力直後に libx264 で再エンコードして容量削減（Issue #175）。
# YouTube は受信動画を VP9/AV1 に再 transcoding するため CRF 22 程度では視聴品質に影響しない。
# `--smooth` 経路でも同じ crf/preset が適用され、圧縮効果が維持される。
compression:
  enabled: true       # false で完全 skip（互換性確保用）
  crf: 22             # H.264 CRF（小さいほど高品質）。CRF 24 なら約 55% 削減（攻める設定）
  preset: slow        # libx264 preset
