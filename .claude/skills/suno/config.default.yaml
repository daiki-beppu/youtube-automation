# suno skill default config
#
# SunoAI V5.5 用プロンプト生成の設定。チャンネル側で config/skills/suno.yaml に上書き。

# Suno ワークスペース名 (UI 表示用)
workspace_name: ""

# ジャンル・スタイル指定文 (Styles 欄に入る共通プレフィックス)
# ボーカル要素 (vocals/rap/singing) が含まれる場合、suno スキルはボーカルモードで処理する
genre_line: ""

# Suno の Exclude Styles 欄に入れる除外語
exclude_styles: "heavy metal, aggressive, EDM, dubstep, techno, industrial, white noise, orchestral, rain sounds, vinyl crackle, ambient noise"

# Style Influence (0-100、高いほどジャンル指定が強く反映される)
style_influence: 50

# Weirdness (0-100、高いほど予測不能な展開が増える)
weirdness: 50

# 歌詞構造の自動タグ付け ([Verse], [Chorus] 等を AI が自動挿入)
auto_lyrics_structure: true

# Style 欄の文字数上限 (Suno UI の制約に合わせる)
style_char_limit: 120

# Style テキストに含めてはならないアーティスト名 (Suno ポリシー / ベストプラクティス)
# 著名アーティスト名を Style に入れると生成がブロックされるか品質が低下する
banned_artists:
  - Drake
  - Taylor Swift
  - The Weeknd
  - Beyonce
  - Kanye West
  - Eminem
  - Rihanna
  - Ed Sheeran
  - Ariana Grande
  - Justin Bieber
  - Billie Eilish
  - Post Malone
  - Dua Lipa
  - Bad Bunny
  - Travis Scott
  - BTS
  - Adele
  - Bruno Mars
  - Lady Gaga
  - Coldplay
  - Imagine Dragons
  - The Beatles
  - Pink Floyd
  - Led Zeppelin
  - Radiohead
  - Daft Punk
  - Aphex Twin
  - Boards of Canada
  - Nujabes
  - J Dilla

# Model (V5.5 推奨)
model: V5.5

# スタイルバリアント (A/B テスト用、省略可)
# 各パターンで style: <key> を指定すると variant 固有の genre_line が使われる
# 代表ジャンル (lo-fi / ambient / piano / nature) の参考テンプレ — 実値は
# `/video-analyze --source benchmark` の `suno_preset.genre_line` を起点に
# チャンネル側 config/skills/suno.yaml で上書き推奨
# style_variants:
#   lo-fi:
#     name: "lo-fi jazz"
#     genre_line: "lo-fi jazz, soft piano, warm rhodes, mellow drums, vinyl warmth"
#   ambient:
#     name: "ambient pad"
#     genre_line: "ambient pad, soft synth, airy textures, sustained chords, subtle field recording"
#   piano:
#     name: "solo piano"
#     genre_line: "solo piano, soft felt piano, intimate dynamics, gentle pedal sustain"
#   nature:
#     name: "nature acoustic"
#     genre_line: "acoustic guitar, soft strings, nature ambience, gentle pulse, woody warmth"

# スタイル戦略: mixed (1 コレクション内で混合) / single (統一)
style_strategy: single

# Style 自動バリエーション (#1456)
# 同一コレクション内の entry ごとに texture / rhythm feel の descriptor を Style 第 1 行末尾へ
# 決定的ローテーションで付与し、Suno V5.5 での楽曲同質化を防ぐ。genre_line のコアジャンルは変えない。
# - 先頭 entry (通し番号 0) は descriptor なしの base style を維持する (コレクションの基準曲)
# - 割り当ては entry の通し番号ベースで決定的 (再生成しても同じ結果)
# - pattern に `style: <variant-key>` の明示 override がある entry には付与しない
# - pools は axis 名 → descriptor 配列。チャンネル側 config/skills/suno.yaml で axis 単位に丸ごと置換できる
# - descriptor には禁止形容詞 (references/suno-examples.md) と雨音・環境音 NG ワードを入れないこと
style_variation:
  enabled: true
  pools:
    texture:
      - warm rounded texture
      - soft airy texture
      - dusty mellow texture
      - smooth velvet texture
      - gentle hazy glow
      - deep woody warmth
      - quiet intimate closeness
      - bright open air
    rhythm:
      - laid-back rhythm feel
      - steady unhurried pulse
      - sparse relaxed groove
      - gentle flowing momentum
      - soft rolling swing
      - low-key driving pulse

# インストモード: 曲数ベースの運用方針
# - tracks_per_collection: 1 コレクションあたりの生成・期待 clip 数。Suno は 1 リクエスト = 2 曲生成のため、
#   yaml `suno-patterns.yaml` の `patterns:` 配列には ceil(tracks_per_collection / 2) 個の entry を
#   並べる。既定の 20 なら 10 entries → 20 clips を生成する。
#   最終 playlist 採用数は下の duration_filter 適用後に減る場合がある。
#   コレクション単位の上書きは `suno-patterns.yaml` の top-level `tracks:` キーで可能。
# - pattern 概念は廃止: 各 entry は独立した情景フレーズで設計する (旧 4 パターン × 3 回生成は使わない)。
tracks_per_collection: 20

# Suno helper の playlist 採用判定に使う collection 単位 duration guard（秒）。
# 生成された clip がこの範囲外なら playlist 追加対象から除外される。
duration_filter:
  min_sec: 60
  max_sec: 300

# ボーカルモード専用: パターン運用方針 (インストモードでは無視される)
# - pattern_strategy: パターン運用の戦略名 (`mixed` = N パターンで起伏を作る / `single` = 1 パターン統合)。
# - tracks_per_pattern: 1 パターンあたりの再生成回数 (Suno は 1 リクエスト = 2 曲生成)。
# - pattern_strategy_note: AI への運用補足 (任意の自由記述)。
pattern_strategy: mixed
tracks_per_pattern: 3
pattern_strategy_note: ""

# ボーカル歌詞本文の生成設定は `/suno-lyric` 側の config.default.yaml が所有する。
# `/suno` は Style / scene / title と `suno-lyrics.json` の merge のみを担当する。
