# suno skill default config
#
# SunoAI v5 用プロンプト生成の設定。チャンネル側で config/skills/suno.yaml に上書き。

# Suno ワークスペース名 (UI 表示用)
workspace_name: ""

# ジャンル・スタイル指定文 (Styles 欄に入る共通プレフィックス)
# ボーカル要素 (vocals/rap/singing) が含まれる場合、suno スキルはボーカルモードで処理する
genre_line: ""

# Suno の Exclude Styles 欄に入れる除外語
exclude_styles: "heavy metal, aggressive, EDM, dubstep, techno, industrial, white noise, orchestral, rain sounds, vinyl crackle, ambient noise"

# 長さ指定プロンプト (V5 の Styles 末尾に追加、-5 分曲用)
duration_prompt: "long-form performance, over 4 minutes, 4 to 5 minutes"

# Style Influence (0-100、高いほどジャンル指定が強く反映される)
style_influence: 85

# Model (V5 推奨)
model: V5

# スタイルバリアント (A/B テスト用、省略可)
# 各パターンで style: A|B|C... を指定すると variant 固有の genre_line が使われる
# style_variants:
#   A:
#     genre_line: ""
#   B:
#     genre_line: ""

# スタイル戦略: mixed (1 コレクション内で混合) / single (統一)
style_strategy: single

# ボーカルモード時の歌詞ガイドライン
# music_engine: suno かつ genre_line にボーカル要素が含まれる場合に適用
lyrics_guidelines:
  # 声のトーン (conversational / narrative / poetic など)
  tone: ""
  # 視点 (first-person / second-person / third-person)
  perspective: ""
  # 韻スタイル (loose / strict / natural)
  rhyme_style: "natural"
  # 言語 (youtube.language と揃える)
  language: en
  # チャンネル固有のキャッチフレーズ (歌詞に織り込む)
  catchphrase: ""
  # 扱わないトピック
  forbidden_topics:
    - politics
    - religion
    - explicit
  # references/lyrics-examples.md 内のどのテンプレを参考にするか (jazzhop / folk / piano など)
  template_reference: ""
