# thumbnail skill default config
#
# チャンネル側で上書きする場合は config/skills/thumbnail.yaml に記述する。
# deep-merge でマージされる (dict は再帰マージ、リスト・スカラは上書き)。

image_generation:
  # provider: "gemini" | "openai"
  # - gemini: Gemini Image (Nano Banana 系) を使用
  # - openai: OpenAI gpt-image 系を使用（OPENAI_API_KEY が必要）
  provider: gemini

  # 事前見積もり用の 1 枚あたりコスト (USD) は各 provider の cost_per_image_usd で
  # 指定したときのみ CLI 表示に使われる。未指定なら CLI には「不明」と表示され、
  # 実コストは GCP Cloud Console > Billing で確認する。

  gemini:
    # 使用する Gemini 画像生成モデル
    model: gemini-3.1-flash-image-preview

    # 生成モード:
    #   single_step   : ベンチマーク模倣 (TTP) の推奨実装。テキスト付き参照画像から
    #                   差分のみ指示し 1 ステップで完成。reference_images.default が必須。
    #   two_phase     : 従来の 2 フェーズ (背景 → テキストオーバーレイ)
    #   diff_from_reference : 既存キャラ画像を参照に差分のみ指示
    generation_mode: single_step

    # single_step モード (推奨 TTP 構成) の挙動制御
    single_step:
      # 試行回数。複数参照画像 + max_attempts > 1 のとき attempt 毎に参照画像を
      # ローテーションし、2 回目以降の出力は -vN で別保存する。
      # CLI の --max-attempts で都度上書き可。
      max_attempts: 1
      # 複数参照画像のとき attempt 毎に切り替えるか (false で先頭固定)
      rotate: true
      # diff_prompt_template に挿入できる共通ガイダンス clause。
      # チャンネル側で diff_prompt_template を組み立てる際に必要に応じて
      # ${variation_clause} のように展開する想定。空文字に上書きで無効化可。
      variation_clause: |
        The reference image is a style guide — produce a variation, not a copy.
        Vary specific objects, framing details, and decorative elements while
        preserving the overall aesthetic. The output must clearly differ from
        the reference in subject details, not be a near-duplicate.
      style_lock_clause: |
        Match the lighting direction, color temperature, and overall mood of
        the reference image.
      text_strip_clause: |
        Do not include any text, captions, watermarks, logos, or typography
        from the reference unless explicitly described in the diff prompt.

    # スタイル説明文 (生成時のスタイル意図、ドキュメンテーション用)
    style: ""

    # チャンネル統一の背景色 (single_step / diff_from_reference で使用)
    # 未定義の場合は single_step の差分指示で背景色指示を省略する
    brand_background: ""

    # 参照画像の定義 (single_step / diff_from_reference モードで必須)
    # default は文字列 1 件、または list で複数件指定可。list 指定時は
    # single_step.rotate=true で attempt 毎にローテーション。
    # reference_images:
    #   default:
    #     - data/thumbnail_compare/benchmark/<channel>-<vid1>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid2>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid3>.jpg
    #   path_base: channel_dir  # channel_dir からの相対パス
    #   notes: ""

    # 差分プロンプトのテンプレ (single_step / diff_from_reference モードで使用)
    # プレースホルダ: {scene_description}, {specific_changes}, {background},
    #                {candle}, {cocktail_description}, {title_line1}, {title_line2}
    diff_prompt_template: ""

    # single_step モードで差し替えるカラーパレット (テーマごとの variation)
    # color_themes:
    #   navy:
    #     background: "deep navy blue"
    #     candle: "warm amber glass jar"
    #     cocktail_description: "old fashioned cocktail in a rocks glass"

    # 固定キャラクターの設定 (あればキャラ固定モード)
    # fixed_character:
    #   species: ""
    #   description: ""
    #   outfit: ""
    #   accessories: ""
    #   expression: ""
    #   pose: ""

    # 構図・環境のルール
    composition_rules:
      environment: ""
      character_size: ""
      character_pose: ""
      allowed_actions: ""
      ng_actions: ""
      background: ""
      text_lines: "タイトルは 2 行以内"
      channel_branding: ""

    # テキストオーバーレイ設定 (two_phase モードで使用)
    thumbnail_text:
      channel_name: ""
      channel_name_style: ""
      title_format: ""
      title_prefix: ""
      copy_position: "right of character"
      font:
        copy: "classic serif"
        genre_tag: "sans-serif bold"
      color: ""
      decoration: "none"
      # Phase 2 のオーバーレイプロンプト (プレースホルダ: {title_line1}, {title_line2}, {channel_name})
      text_overlay_prompt: ""

  openai:
    # 使用する OpenAI 画像生成モデル
    model: gpt-image-2

    # 品質階層: low | medium | high
    quality: high

    # アスペクト比は "16:9" / "9:16" のみサポート（thumbnail スキルは内部で 16:9 固定）
    aspect_ratio: "16:9"

    # 構図プランニング: off | low | medium | high
    thinking: medium

    # 1 リクエストで生成する枚数（n パラメータ）
    batch: 1

    # 事前見積もりに使う 1 枚あたり単価を固定したい場合のみ指定する。
    # 未指定なら CLI 表示は「不明」となり、実コストは GCP Cloud Console > Billing で確認する。
    # cost_per_image_usd: null
