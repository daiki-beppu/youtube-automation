# thumbnail skill default config
#
# チャンネル側で上書きする場合は config/skills/thumbnail.yaml に記述する。
# deep-merge でマージされる (dict は再帰マージ、リスト・スカラは上書き)。

# 動画背景用の textless main をサムネイルと分離する既定契約。
# false に明示したチャンネルだけ、確定済み thumbnail.jpg を同一内容の main.jpg
# として共用し、追加の textless 生成・承認を省略する。
textless:
  enabled: true

# 承認済みサムネイルのギャラリー保存 (#1942)。
# true の場合、確定直後に assets/thumbnail-gallery/<collection-dir-name>.<ext>
# へ元の拡張子・内容のままコピーする。false なら従来どおり何も作らない。
archive:
  enabled: false

# YouTube Studio の Test & compare に投入する最終サムネイル群。
# false / 未設定なら従来どおり thumbnail.jpg 1 枚だけを確定する。
# true の場合は 1〜3 件の pattern を定義し、variation を既存の
# diff_prompt_template 展開後のプロンプト末尾へ pattern ごとに合成する。
ab_test:
  enabled: false
  patterns: []

image_generation:
  # provider: "gemini" | "openai" | "codex"
  # - gemini: Gemini Image (Nano Banana 系) を使用
  # - openai: OpenAI gpt-image 系を使用（OPENAI_API_KEY が必要）
  # - codex: codex-image.sh 経由で ChatGPT サブスク認証を使用（GCP 課金なし）
  provider: gemini

  # 事前見積もり用の 1 枚あたりコスト (USD) は各 provider の cost_per_image_usd で
  # 指定したときのみ CLI 表示に使われる。未指定なら CLI には「不明」と表示され、
  # 実コストは provider の課金画面で確認する。codex は GCP 課金なし、ChatGPT
  # サブスクの fair-use 対象。

  # ボツ画像ストック化 (#364): /thumbnail と /collection-ideate で不採用となった
  # 画像を <channel_dir>/assets/stock/<theme>/ に隣接 .meta.json 付きで退避する。
  # 別コレクションで参照画像として再利用できる。
  stock:
    # false にすると uv run yt-stock-archive は退避せず unlink のみ実施 (従来挙動)
    enabled: true
    # uv run yt-stock-prune の保持日数 (mtime 基準、未指定なら CLI 引数必須)
    retention_days: 90
    # uv run yt-stock-prune のテーマあたり最大保持件数 (未指定なら CLI 引数必須)
    max_per_theme: 50

  # thumbnail 候補の自動選択 (#1370): TTP 参照画像プール
  # (image_generation.gemini.reference_images.default) の特徴量 centroid に
  # 最も近い候補を yt-thumbnail-auto-select で 10-assets/thumbnail.jpg として
  # 自動確定する。TTP が確立したチャンネル向けの opt-in。
  auto_selection:
    # true にすると候補生成後、ユーザー承認の代わりに
    # `yt-thumbnail-auto-select <collection-path> --apply` で自動確定できる。
    # false / 未設定のチャンネルは従来どおり手動承認フロー (挙動は変わらない)。
    enabled: false
    # 自動化の範囲 (#2166。親 #1679 の全自動モード):
    #   selection_only : 候補選択の自動確定のみ (#1370 相当。既定・未設定時もこれ)
    #   full           : skill 層 (/thumbnail) が承認ゲートを省略する全自動モード。
    #                    Python CLI 側は mode を結果 JSON / workflow-state に記録し、
    #                    適格候補ゼロ時に手動フロー切替ガイダンス付きで停止する。
    #                    テーマ自動決定など skill 側の挙動は SKILL.md を参照 (#2167)。
    mode: selection_only
    # 候補が満たすべき最小解像度 (YouTube 推奨 1280x720)
    min_width: 1280
    min_height: 720
    # 16:9 判定の許容誤差 (|width/height - 16/9| がこの値以下なら適格)
    aspect_tolerance: 0.01

  gemini:
    # 使用する Gemini 画像生成モデル
    model: gemini-3.1-flash-image-preview

    # 生成モード:
    #   single_step   : ベンチマーク模倣 (TTP) の推奨実装。テキスト付き参照画像から
    #                   差分のみ指示して text-included thumbnail 候補を生成する。
    #                   reference_images.default が必須。
    #                   #1907 以降の標準フローは同じ TTP 機構を textless 背景候補の
    #                   生成に流用し、テキストは yt-thumbnail-text で決定的に合成する
    #                   (text-included 候補の直接生成は AI 焼き込み fallback)。
    #   two_phase     : 既存参照から text-included thumbnail を先に確定し、
    #                   承認済み thumbnail から textless main を後続再生成するフォールバック
    #   diff_from_reference : 既存キャラ画像を参照に差分のみ指示
    generation_mode: single_step

    # single_step モード (推奨 TTP 構成) の挙動制御
    single_step:
      # 試行回数。max_attempts > 1 のときは候補ごとにユニークな参照画像を
      # 1 枚ずつ割り当てる。参照画像が候補数より少ない場合は再利用せずエラー。
      # CLI の --max-attempts で都度上書き可。
      max_attempts: 1
      # 複数参照画像のとき attempt 毎に切り替えるか。
      # single_step TTP で max_attempts > 1 の場合、false は同一参照の再利用になるためエラー。
      rotate: true
      # ---- ガイダンス clause の方針 (#1702) ----
      # TTP は参照画像主導で生成する。プロンプトに指示を積むほど参照画像の支配力が
      # 薄れるため、既定で注入される clause は ip_safety_clause の 1 つだけに集約した。
      # 以下の opt-in clause 群は既定空文字（展開しても no-op）。必要なチャンネルだけ
      # config/skills/thumbnail.yaml で本文を設定し、自前の diff_prompt_template で
      # ${<clause 名>} として展開する。推奨文面は各 clause のコメントを参照。
      #
      # variation_clause (opt-in): 参照の near-duplicate が続くチャンネル向け。推奨文面:
      #   The reference image is a style guide — produce a variation, not a copy.
      #   Vary specific objects, framing details, and decorative elements while
      #   preserving the overall aesthetic.
      variation_clause: ""
      # style_lock_clause (opt-in): 参照とライティング・色温度が揃わないとき。推奨文面:
      #   Match the lighting direction, color temperature, and overall mood of
      #   the reference image.
      style_lock_clause: ""
      # text_strip_clause (opt-in): textless main 再生成プロンプト専用（テキスト付き
      # thumbnail 生成には展開しない）。未設定時は SKILL.md の「Remove all text」相当の
      # 除去指示をそのまま書く。推奨文面:
      #   Do not include any text, captions, watermarks, logos, or typography
      #   from the reference unless explicitly described in the diff prompt.
      text_strip_clause: ""
      # anatomy_clause (#570, opt-in): キャラ + 手が写る構図で指の破綻（融合・本数異常・
      # 溶融）が出るチャンネルだけ本文を設定し、diff_prompt_template で
      # ${anatomy_clause} を展開する。推奨文面:
      #   Hands must be anatomically correct: five fingers on each hand, clearly
      #   separated, no fused fingers, no extra fingers, no melted or distorted
      #   fingers, natural proportions. Body proportions must be realistic with
      #   no distorted limbs, joints, or facial features.
      anatomy_clause: ""
      # IP / 版権セーフティ clause (#569)。参照元の署名・サイン・透かし・ロゴ等の
      # 識別マークが TTP 経由で焼き込まれる事故を抑止するため、TTP / single_step
      # / diff プロンプト構築時には常時末尾に挿入する（**唯一の既定 clause**）。
      # 空文字で無効化可だが、ベンチマーク模倣を行う以上は維持を強く推奨。
      ip_safety_clause: |
        Do not reproduce any signature, autograph, handwritten name, watermark,
        logo, brand mark, channel badge, copyright notice, or identifying mark
        from the reference image. Keep all corners clean and free of such marks.
      # typography_clause (#1332, opt-in): タイトル文字の書体をテキスト付き
      # thumbnail prompt で指示する clause。
      # 承認済み thumbnail から作る textless 再生成プロンプトには展開しない。
      # {font_description} は thumbnail_text.font.copy の値で置換して使う。推奨文面:
      #   Render the title text in a consistent {font_description} typeface.
      #   Keep the same letterforms, weight, and style across the whole title.
      #   Do not mix multiple typefaces in the title.
      # 注意: AI 画像生成はフォント名の厳密な再現を保証しない。書体をピクセル単位で
      # 固定したい場合は image_generation.gemini.thumbnail_text.overlay
      # (yt-thumbnail-text) を使うこと。
      typography_clause: ""

    # NG ワードの事前検査 (#1664): 最終プロンプト文字列に大小文字無視の部分一致で
    # ヒットするキーワードがあれば、生成 API / codex exec を呼ばずエラー停止する。
    # workflow-state.json::planning.music.* (音楽用フィールド) の値がチャンネル規約
    # 違反のまま画像 prompt に転写される事故 (例: "a sunglassed drummer") を機械的に
    # 弾く用途。未設定・空リストなら検査しない (no-op)。
    # キーは gemini namespace に置くが、検査は provider 非依存
    # (Gemini / OpenAI / gemini_cli / codex の全入口で共通)。
    # forbid_keywords:
    #   - "sunglasses"
    forbid_keywords: []

    # スタイル説明文 (生成時のスタイル意図、ドキュメンテーション用)
    style: ""

    # チャンネル統一の背景色 (single_step / diff_from_reference で使用)
    # 未定義の場合は single_step の差分指示で背景色指示を省略する
    brand_background: ""

    # 参照画像の定義 (single_step / diff_from_reference モードで必須)
    # default は同じベンチマークチャンネル内の別サムネイル画像を list で指定する。
    # --max-attempts N で N 候補を出す場合、N 枚以上のユニークな参照画像が必要。
    # 文字列 1 件は --max-attempts 1 または --reference-index の固定生成用。
    # reference_images:
    #   default:
    #     - data/thumbnail_compare/benchmark/<channel>-<vid1>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid2>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid3>.jpg
    #   path_base: channel_dir  # プロジェクトルートからの相対パス
    #   notes: ""

    # stock 再利用 (#364 PR-B): assets/stock/<theme>/ のボツ画像を参照プールに
    # 自動合成する。default の参照画像と合算され、attempt ローテーションの対象になる。
    # TTP single_step は同一ベンチマークチャンネルの複数サムネを前提にするため、
    # default では OFF。別スコープとして明示的に混ぜたいチャンネルのみ override する。
    reference_images:
      # 全 collection の thumbnail-prompts.md から未使用参照を優先し、一巡後は直近この件数を除外する。
      # 候補数に足りない枠だけ位置順で補い、全参照が採用される前の先頭候補重複を防ぐ。0 で無効化可。
      dedup_recent_collections: 5
      stock:
        # true で stock 合成を有効化。TTP 参照プールとは別スコープとして扱うこと。
        enabled: false
        # 1 回の生成で混ぜる最大件数 (mtime 降順 or shuffle 後の先頭 N)
        max_count: 3
        # "exact" → 同じ theme slug のみ採用 / "any" → 全テーマから採用
        theme_match: "exact"
        # SOURCE_ROLES でフィルタ ("thumbnail_candidate" | "ideate_preview" | null)
        # thumbnail スキルでは thumbnail_candidate のみに絞り意図しない混入を防止
        source_role: "thumbnail_candidate"
        # mtime 降順 (false) か、多様化のため shuffle (true)
        shuffle: true
        # shuffle 用 seed (null なら毎回ランダム)
        seed: null
        # stock が空でもエラーにせず default のみで継続
        fallback_when_empty: true

    # 差分プロンプトのテンプレ (single_step / diff_from_reference モードで使用)
    # プレースホルダ: {scene_description}, {specific_changes}, {background},
    #                {candle}, {cocktail_description}, {title_line1}, {title_line2}
    # 既定値は codex の default_prompt_template と同じ TTP 方針
    # （winning layout 維持 + 最小限の品質改善のみ。#2070）。
    # 方針行の同期は tests/test_thumbnail_skill_assets.py で機械担保する。
    # チャンネル側 config/skills/thumbnail.yaml の diff_prompt_template は
    # deep-merge のスカラ置換でこの既定値より常に優先される。
    # {title_line1} / {title_line2} に渡すのはサムネに焼くテキストだけ
    # （動画タイトル全文を渡さない。codex の {title} 意味論と同じ）。
    diff_prompt_template: |
      TTP this reference thumbnail, then improve it into a stronger original thumbnail.
      Keep the winning layout, typography feel, character scale, color mood, texture, and energy.
      Make it cleaner, more readable on mobile, stronger face impact, no logos, no watermarks, no broken hands.
      Use the title {title_line1} {title_line2}.
      ${ip_safety_clause}

    # single_step モードで差し替えるカラーパレット (テーマごとの variation)
    # color_themes:
    #   navy:
    #     background: "deep navy blue"
    #     candle: "warm amber glass jar"
    #     cocktail_description: "old fashioned cocktail in a rocks glass"

    # 固定キャラクターの設定 (あればキャラ固定モード)
    # fixed_character:
    #   species: ""
    #   description: ""
    #   outfit: ""
    #   accessories: ""
    #   expression: ""
    #   pose: ""

    # 構図・環境のルール (#1702 で縮小)
    # TTP モードで実効性を確認できた text_lines だけを既定に残す。
    # 以下の旧キーは deprecated（override は引き続き deep-merge されるが、
    # config ロード時に DeprecationWarning が出る。物理削除は後続リリース）:
    #   environment / character_size / character_pose / allowed_actions /
    #   ng_actions / background / channel_branding
    # 移行ガイド: 構図・環境の意図は個別キーではなく、チャンネル側
    # diff_prompt_template の本文（差分指示）に短い文で直接書く。
    composition_rules:
      text_lines: "タイトルは 2 行以内"

    # テキストオーバーレイ設定 (two_phase モードで使用。#1702 で縮小)
    # text_overlay_prompt を実質単一の入口とする。旧個別フィールドは deprecated
    # （override は引き続き deep-merge されるが、config ロード時に
    # DeprecationWarning が出る。物理削除は後続リリース）:
    #   channel_name_style / title_format / title_prefix / copy_position /
    #   color / decoration
    # 移行ガイド: 位置・色・装飾・書式の意図は text_overlay_prompt の本文に
    # 直接書く。書体の雰囲気指示だけ font.* を残す（typography_clause /
    # two_phase フォールバックが参照）。
    thumbnail_text:
      channel_name: ""
      # AI プロンプト用のフォント記述 (雰囲気の指示。厳密な書体再現は保証されない)
      font:
        copy: "classic serif"
        genre_tag: "sans-serif bold"
      # Phase 2 のオーバーレイプロンプト (プレースホルダ: {title_line1}, {title_line2}, {channel_name})
      text_overlay_prompt: ""

      # 決定的フォント合成 (#1332。#1907 で標準テキスト描画経路化):
      # image_generation.gemini.thumbnail_text.overlay に置く yt-thumbnail-text の設定。
      # textless 背景に実フォントファイルを Pillow で描画する。AI 生成と違い、
      # 同一の背景・テキスト・設定なら常に同一の出力になる (フォントが安定再現される)。
      # フォント未設定・ファイル不在時は理由と代替手順つきの ConfigError になる。
      # /channel-new 分析モードの docs/benchmarks/thumbnail-text-profile.md がある場合、
      # /thumbnail はフォント傾向 → font.title (+ title.stroke_*)、配置傾向 →
      # layout.anchor / margin_x / margin_y へ変換してチャンネル側
      # config/skills/thumbnail.yaml に設定する (適用手順は SKILL.md の
      # 「thumbnail-text-profile 適用」節)。profile 不在時はこのデフォルト値のまま。
      overlay:
        font:
          # タイトル行のフォントファイル (.ttf / .otf / .ttc)。
          # 絶対パス、またはプロジェクトルートからの相対パスで指定 (必須)。
          # 例) title: "assets/fonts/NotoSansJP-Bold.ttf"
          title: ""
          # チャンネル名のフォント。未設定なら title を継承
          channel_name: ""
        title:
          size: 96
          color: "#FFFFFF"
          stroke_width: 4
          stroke_color: "#000000"
        channel_name:
          size: 36
          color: "#FFFFFF"
          stroke_width: 0
          stroke_color: "#000000"
        layout:
          # top|center|bottom - left|center|right の 9 アンカー (中央は "center")
          anchor: "bottom-center"
          margin_x: 64
          margin_y: 48
          # タイトル行の行送り (フォント高さに対する倍率)
          line_spacing: 1.15
          # タイトルとチャンネル名の間隔 (px)
          gap: 24

  openai:
    # 使用する OpenAI 画像生成モデル
    model: gpt-image-2

    # 品質階層: low | medium | high
    # 既定は medium。high は 1 枚あたりの単価が数倍高いため、
    # コストを許容できるチャンネルのみ明示的に high へ変更する（#1697）
    quality: medium

    # アスペクト比は "16:9" / "9:16" のみサポート（thumbnail スキルは内部で 16:9 固定）
    aspect_ratio: "16:9"

    # 構図プランニング: off | low | medium | high
    thinking: medium

    # 1 リクエストで生成する枚数（n パラメータ）
    batch: 1

    # 事前見積もりに使う 1 枚あたり単価を固定したい場合のみ指定する。
    # 未指定なら CLI 表示は「不明」となり、実コストは GCP Cloud Console > Billing で確認する。
    # cost_per_image_usd: null

  codex:
    # codex-image.sh 経路は API provider ではないため model / quality は持たない。
    # ChatGPT サブスクの fair-use 上限内で使い、大量生成には使わない。
    # バッチ候補生成の同時起動上限。CLI --max-parallel で実行単位に上書きできる。
    max_parallel: 2
    # cost_per_image_usd: null
    # 参照サムネを mood reference ではなく winning template として扱い、
    # テキスト付き thumbnail 候補を先に確定する短い TTP プロンプト（#1611 の thumbnail 先行フロー）。
    # SKILL.md「既定テンプレート」ブロックと完全一致させる
    # （tests/test_thumbnail_skill_assets.py で機械担保）。
    # {title} に渡すのはサムネに焼くテキスト（見出し + 短いサブタイトル）だけ。
    # 動画タイトル全文を渡さない（全文が画像に焼き込まれる事故の再発防止）。
    default_prompt_template: |
      TTP this reference thumbnail, then improve it into a stronger original thumbnail.
      Keep the winning layout, typography feel, character scale, color mood, texture, and energy.
      Make it cleaner, more readable on mobile, stronger face impact, no logos, no watermarks, no broken hands.
      Use the title {title}.
