# thumbnail skill default config
#
# チャンネル側で上書きする場合は config/skills/thumbnail.yaml に記述する。
# deep-merge でマージされる (dict は再帰マージ、リスト・スカラは上書き)。

image_generation:
  # provider: "gemini" | "openai" | "codex"
  # - gemini: Gemini Image (Nano Banana 系) を使用
  # - openai: OpenAI gpt-image 系を使用（OPENAI_API_KEY が必要）
  # - codex: codex-image.sh 経由で ChatGPT サブスク認証を使用（GCP 課金なし）
  provider: gemini

  # 事前見積もり用の 1 枚あたりコスト (USD) は各 provider の cost_per_image_usd で
  # 指定したときのみ CLI 表示に使われる。未指定なら CLI には「不明」と表示され、
  # 実コストは provider の課金画面で確認する。codex は GCP 課金なし、ChatGPT
  # サブスクの fair-use 対象。

  # ボツ画像ストック化 (#364): /thumbnail と /collection-ideate で不採用となった
  # 画像を <channel_dir>/assets/stock/<theme>/ に隣接 .meta.json 付きで退避する。
  # 別コレクションで参照画像として再利用できる。
  stock:
    # false にすると bunx tayk stock-archive は退避せず unlink のみ実施 (従来挙動)
    enabled: true
    # bunx tayk stock-prune の保持日数 (mtime 基準、未指定なら CLI 引数必須)
    retention_days: 90
    # bunx tayk stock-prune のテーマあたり最大保持件数 (未指定なら CLI 引数必須)
    max_per_theme: 50

  # thumbnail 候補の自動選択 (#1370): TTP 参照画像プール
  # (image_generation.gemini.reference_images.default) の特徴量 centroid に
  # 最も近い候補を yt-thumbnail-auto-select で 10-assets/thumbnail.jpg として
  # 自動確定する。TTP が確立したチャンネル向けの opt-in。
  auto_selection:
    # true にすると候補生成後、ユーザー承認の代わりに
    # `yt-thumbnail-auto-select <collection-path> --apply` で自動確定できる。
    # false / 未設定のチャンネルは従来どおり手動承認フロー (挙動は変わらない)。
    enabled: false
    # 候補が満たすべき最小解像度 (YouTube 推奨 1280x720)
    min_width: 1280
    min_height: 720
    # 16:9 判定の許容誤差 (|width/height - 16/9| がこの値以下なら適格)
    aspect_tolerance: 0.01

  gemini:
    # 使用する Gemini 画像生成モデル
    model: gemini-3.1-flash-image-preview

    # 生成モード:
    #   single_step   : ベンチマーク模倣 (TTP) の推奨実装。テキスト付き参照画像から
    #                   構図・色・質感だけを参照し、textless 背景を先に作る。
    #                   reference_images.default が必須。
    #   two_phase     : 従来の 2 フェーズ (背景 → テキストオーバーレイ)
    #   diff_from_reference : 既存キャラ画像を参照に差分のみ指示
    generation_mode: single_step

    # single_step モード (推奨 TTP 構成) の挙動制御
    single_step:
      # 試行回数。max_attempts > 1 のときは候補ごとにユニークな参照画像を
      # 1 枚ずつ割り当てる。参照画像が候補数より少ない場合は再利用せずエラー。
      # CLI の --max-attempts で都度上書き可。
      max_attempts: 1
      # 複数参照画像のとき attempt 毎に切り替えるか。
      # single_step TTP で max_attempts > 1 の場合、false は同一参照の再利用になるためエラー。
      rotate: true
      # diff_prompt_template に挿入できる共通ガイダンス clause。
      # チャンネル側で diff_prompt_template を組み立てる際に必要に応じて
      # ${variation_clause} のように展開する想定。空文字に上書きで無効化可。
      variation_clause: |
        The reference image is a style guide — produce a variation, not a copy.
        Vary specific objects, framing details, and decorative elements while
        preserving the overall aesthetic. The output must clearly differ from
        the reference in subject details, not be a near-duplicate.
      style_lock_clause: |
        Match the lighting direction, color temperature, and overall mood of
        the reference image.
      text_strip_clause: |
        Do not include any text, captions, watermarks, logos, or typography
        from the reference unless explicitly described in the diff prompt.
      # anatomy_clause (#570): キャラ + 手が写る構図で diff_prompt_template に
      # ${anatomy_clause} として展開する。Gemini は楽器持ち・指を伸ばす/握るポーズで
      # 指の融合・本数異常・溶融を起こしやすい。空文字に上書きで無効化可。
      anatomy_clause: |
        Hands must be anatomically correct: five fingers on each hand, clearly
        separated, no fused fingers, no extra fingers, no melted or distorted
        fingers, natural proportions. Body proportions must be realistic with
        no distorted limbs, joints, or facial features.
      # IP / 版権セーフティ clause (#569)。参照元の署名・サイン・透かし・ロゴ等の
      # 識別マークが TTP 経由で焼き込まれる事故を抑止するため、TTP / single_step
      # / diff プロンプト構築時には常時末尾に挿入することを推奨する。
      # 空文字で無効化可だが、ベンチマーク模倣を行う以上は維持を強く推奨。
      ip_safety_clause: |
        Do not reproduce any signature, autograph, handwritten name, watermark,
        logo, brand mark, channel badge, copyright notice, or identifying mark
        from the reference image. Keep all corners clean and free of such marks.
      # typography_clause (#1332): タイトル文字の書体を第2段の
      # テキスト付き thumbnail prompt で指示する clause。
      # 初回 textless 背景用の diff_prompt_template には展開しない。
      # {font_description} は thumbnail_text.font.copy の値で置換して使う。
      # 注意: AI 画像生成はフォント名の厳密な再現を保証しない。書体をピクセル単位で
      # 固定したい場合は image_generation.gemini.thumbnail_text.overlay
      # (yt-thumbnail-text) を使うこと。
      typography_clause: |
        Render the title text in a consistent {font_description} typeface.
        Keep the same letterforms, weight, and style across the whole title.
        Do not mix multiple typefaces in the title.

    # スタイル説明文 (生成時のスタイル意図、ドキュメンテーション用)
    style: ""

    # チャンネル統一の背景色 (single_step / diff_from_reference で使用)
    # 未定義の場合は single_step の差分指示で背景色指示を省略する
    brand_background: ""

    # 参照画像の定義 (single_step / diff_from_reference モードで必須)
    # default は同じベンチマークチャンネル内の別サムネイル画像を list で指定する。
    # --max-attempts N で N 候補を出す場合、N 枚以上のユニークな参照画像が必要。
    # 文字列 1 件は --max-attempts 1 または --reference-index の固定生成用。
    # reference_images:
    #   default:
    #     - data/thumbnail_compare/benchmark/<channel>-<vid1>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid2>.jpg
    #     - data/thumbnail_compare/benchmark/<channel>-<vid3>.jpg
    #   path_base: channel_dir  # プロジェクトルートからの相対パス
    #   notes: ""

    # stock 再利用 (#364 PR-B): assets/stock/<theme>/ のボツ画像を参照プールに
    # 自動合成する。default の参照画像と合算され、attempt ローテーションの対象になる。
    # TTP single_step は同一ベンチマークチャンネルの複数サムネを前提にするため、
    # default では OFF。別スコープとして明示的に混ぜたいチャンネルのみ override する。
    reference_images:
      stock:
        # true で stock 合成を有効化。TTP 参照プールとは別スコープとして扱うこと。
        enabled: false
        # 1 回の生成で混ぜる最大件数 (mtime 降順 or shuffle 後の先頭 N)
        max_count: 3
        # "exact" → 同じ theme slug のみ採用 / "any" → 全テーマから採用
        theme_match: "exact"
        # SOURCE_ROLES でフィルタ ("thumbnail_candidate" | "ideate_preview" | null)
        # thumbnail スキルでは thumbnail_candidate のみに絞り意図しない混入を防止
        source_role: "thumbnail_candidate"
        # mtime 降順 (false) か、多様化のため shuffle (true)
        shuffle: true
        # shuffle 用 seed (null なら毎回ランダム)
        seed: null
        # stock が空でもエラーにせず default のみで継続
        fallback_when_empty: true

    # 差分プロンプトのテンプレ (single_step / diff_from_reference モードで使用)
    # プレースホルダ: {scene_description}, {specific_changes}, {background},
    #                {candle}, {cocktail_description}, {title_line1}, {title_line2}
    diff_prompt_template: ""

    # single_step モードで差し替えるカラーパレット (テーマごとの variation)
    # color_themes:
    #   navy:
    #     background: "deep navy blue"
    #     candle: "warm amber glass jar"
    #     cocktail_description: "old fashioned cocktail in a rocks glass"

    # 固定キャラクターの設定 (あればキャラ固定モード)
    # fixed_character:
    #   species: ""
    #   description: ""
    #   outfit: ""
    #   accessories: ""
    #   expression: ""
    #   pose: ""

    # 構図・環境のルール
    composition_rules:
      environment: ""
      character_size: ""
      character_pose: ""
      allowed_actions: ""
      ng_actions: ""
      background: ""
      text_lines: "タイトルは 2 行以内"
      channel_branding: ""

    # テキストオーバーレイ設定 (two_phase モードで使用)
    thumbnail_text:
      channel_name: ""
      channel_name_style: ""
      title_format: ""
      title_prefix: ""
      copy_position: "right of character"
      # AI プロンプト用のフォント記述 (雰囲気の指示。厳密な書体再現は保証されない)
      font:
        copy: "classic serif"
        genre_tag: "sans-serif bold"
      color: ""
      decoration: "none"
      # Phase 2 のオーバーレイプロンプト (プレースホルダ: {title_line1}, {title_line2}, {channel_name})
      text_overlay_prompt: ""

      # 決定的フォント合成 (#1332):
      # image_generation.gemini.thumbnail_text.overlay に置く yt-thumbnail-text の設定。
      # textless 背景に実フォントファイルを Pillow で描画する。AI 生成と違い、
      # 同一の背景・テキスト・設定なら常に同一の出力になる (フォントが安定再現される)。
      # フォント未設定・ファイル不在時は理由と代替手順つきの ConfigError になる。
      overlay:
        font:
          # タイトル行のフォントファイル (.ttf / .otf / .ttc)。
          # 絶対パス、またはプロジェクトルートからの相対パスで指定 (必須)。
          # 例) title: "assets/fonts/NotoSansJP-Bold.ttf"
          title: ""
          # チャンネル名のフォント。未設定なら title を継承
          channel_name: ""
        title:
          size: 96
          color: "#FFFFFF"
          stroke_width: 4
          stroke_color: "#000000"
        channel_name:
          size: 36
          color: "#FFFFFF"
          stroke_width: 0
          stroke_color: "#000000"
        layout:
          # top|center|bottom - left|center|right の 9 アンカー (中央は "center")
          anchor: "bottom-center"
          margin_x: 64
          margin_y: 48
          # タイトル行の行送り (フォント高さに対する倍率)
          line_spacing: 1.15
          # タイトルとチャンネル名の間隔 (px)
          gap: 24

  openai:
    # 使用する OpenAI 画像生成モデル
    model: gpt-image-2

    # 品質階層: low | medium | high
    quality: high

    # アスペクト比は "16:9" / "9:16" のみサポート（thumbnail スキルは内部で 16:9 固定）
    aspect_ratio: "16:9"

    # 構図プランニング: off | low | medium | high
    thinking: medium

    # 1 リクエストで生成する枚数（n パラメータ）
    batch: 1

    # 事前見積もりに使う 1 枚あたり単価を固定したい場合のみ指定する。
    # 未指定なら CLI 表示は「不明」となり、実コストは GCP Cloud Console > Billing で確認する。
    # cost_per_image_usd: null

  codex:
    # codex-image.sh 経路は API provider ではないため model / quality は持たない。
    # ChatGPT サブスクの fair-use 上限内で使い、大量生成には使わない。
    # cost_per_image_usd: null
    # 参照サムネを mood reference ではなく winning template として扱い、
    # textless 背景を先に固める短い TTP プロンプト。
    default_prompt_template: |
      TTP this reference thumbnail into a stronger original textless background for {title}.
      Keep the winning layout, character scale, color mood, lighting, texture, and energy.
      Remove all text, typography, logos, watermarks, brand marks, and channel badges.
      Do not add any title text yet; the approved background will be used for the final thumbnail.
