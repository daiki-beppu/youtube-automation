# /short-release skill 動作パラメータ（生成側）。
#
# チャンネル運用設定（enabled / publish_time / languages / start_sec / duration_sec）は
# config/channel/shorts.json の shorts.release セクションに置く。両者を混同しないこと。
#
# チャンネル側上書きは config/skills/short-release.yaml。

# generate-shorts.sh の品質パラメータ
crf: 18                   # 画質（小さいほど高品質）
preset: slow              # x264 エンコーダプリセット
audio_bitrate: "192k"     # AAC ビットレート
