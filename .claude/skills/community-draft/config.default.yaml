# community-draft skill default config
#
# YouTube コミュニティ投稿の下書き生成テンプレ。
# チャンネル側で config/skills/community-draft.yaml に上書き可能（deep-merge）。
# チャンネル固有のテキスト・軸定義は config/channel/community-draft.json で扱う。

community_draft:
  # 投稿全体のトーンガイド（任意 / 上書き想定）
  tone: ""
  length_target_chars: 200

  templates:
    # ---------------- 既存 type（#509 で upstream フル仕様化） ----------------

    behind_the_scenes:
      enabled: true
      # 一人称 4 文構造。各 sentence は本 skill が公式提供する変数で render される。
      # 詳細は SKILL.md の「`behind-the-scenes` の構造」を参照。
      structure:
        - "scene_hook"          # 1 文: 制作中の情景 (uses {scene_phrase})
        - "mood_anchor"         # 2 文: そのときの mood (uses {personal_mood})
        - "signature_element"   # 3 文: drink_signature / animal_object 言及
        - "listening_invitation" # 4 文: music_style + 聴き方の誘導
      # 解決されない変数は placeholder のまま draft 出力し warning を吐く。
      # render 変数の解決優先順: workflow-state.json::planning.*
      #   → config/channel/community-draft.json::shared_variables
      #   → config/channel/content.json::genre
      variables:
        - "scene_phrase"
        - "personal_mood"
        - "drink_signature"
        - "animal_object"
        - "music_style"
      # 表記ルール (時刻 24h / 運用メモ AM/PM) は day_of_reminder と共通
      append_footer:
        notification_cta: true
        gratitude: true
        signature: true

    next_teaser:
      enabled: true
      # 次に公開予定のコレクションを workflow-state.json から探索する。
      # 探索ルール: collections/planning/*/workflow-state.json から
      #   planning.publish_target_at を持つもののうち、今より後で最小のものを採用。
      lookup_strategy: "next_planning_workflow_state"
      structure:
        - "continuity_bridge"    # 1 文: 直近公開コレクションへの感謝・余韻
        - "next_hook"            # 1 文: 次コレクションの scene_phrase を匂わせる
        - "invite_to_vote"       # 1 文 (optional): weekly_feedback アクティブ時の CTA
      # publish.scheduled_at が未確定なら時刻表記は出さず "Coming soon" 系で曖昧化
      respect_unscheduled_collection: true
      variables:
        - "scene_phrase"         # 次コレクションの scene_phrase
        - "music_style"

    poll:
      enabled: false
      # DEPRECATED (#509). weekly_feedback に正式 retire 済み。
      # 利用検知時に utils.weekly_vote_log.warn_poll_deprecated() が warning を吐く。
      _status: "DEPRECATED (#509): --type weekly-feedback に移行してください"
      _deprecated_since: "5.6.0"
      _replacement: "weekly_feedback"

    # ---------------- 新規 type（issue #309 で追加） ----------------

    day_of_reminder:
      enabled: true
      # 装飾フォント（Mathematical Bold sans-serif）on/off。
      # true にすると 𝐍𝐞𝐰 𝐝𝐫𝐨𝐩 𝐭𝐨𝐝𝐚𝐲 のような Unicode 数式文字で出力。
      decorative_font: false
      # 見出しテンプレ。{publish_time_24h_*} は 24h 表記（視聴者向け本文）で扱う。
      headline_template: "📢 New drop today — {publish_time_24h_primary} {primary_tz} / {publish_time_24h_secondary} {secondary_tz}"
      timezone:
        # チャンネル config で上書き想定。primary 必須、secondary 任意。
        primary: "UTC"
        secondary: null
      # 本文セクション順
      structure:
        - "headline"
        - "personal_mood"
        - "creative_intent"
        - "listening_cta"
        - "notification_cta"
        - "gratitude"
        - "signature"
      # 末尾に Premiere URL を貼って Studio に自動カード化させる
      append_premiere_url: true
      # 出力先（コレクション紐づき）
      output_path: "collections/<live_dir>/30-promo/community-post-draft.md"

    weekly_feedback:
      enabled: false
      # 投稿スケジュール（人間向けガイド表記）
      schedule: "Every Sunday"
      # 運用メモ用の AM/PM 表記（Studio 予約 UI と整合）。
      # 投稿本文の時刻 (24h) とは別変数で扱うこと。
      schedule_window_local_ampm: "9:00 AM - 12:00 PM"
      schedule_timezone: "UTC"
      decorative_font: false
      headline_template: "📢 Sunday vote — what's next week?"
      # チャンネル config（config/channel/community-draft.json）で N 軸を定義。
      # upstream デフォルトは空。各軸は {key: {label, poll_emoji}} の形式。
      # 実例は examples/community-draft-rjn/rain-5-axis.yaml を参照。
      theme_axis_pool: []
      # ローテーション規則
      rotation_rule:
        # 毎週提示する選択肢数。"auto" の場合 axis_count - 1 を採用（rjn は 5 軸 → 4 択）。
        present_count: "auto"
        # 1 周にかかる週数。"auto" の場合 axis_count を採用（rjn は 5 週 1 周）。
        cycle_weeks: "auto"
      # 投票履歴ログ（#509 で schema 正式化）。
      # 書き込みは `yt-vote-log append` か `utils.weekly_vote_log.append_weekly_vote_entry()` 経由。
      # JSON Schema は `youtube_automation.utils.schemas.weekly_vote_log.schema.json`。
      vote_log_path: "data/community/weekly-vote-log.json"
      # 本文セクション順
      structure:
        - "headline"
        - "opener"
        - "intent"
        - "poll"
        - "promise"
        - "notification_cta"
        - "gratitude"
        - "signature"
      # 出力先（コレクション非紐づき / 週次運用）
      output_path: "branding/community-templates/weekly-feedback.md"
      # 参考実装（デフォルトには反映されない）
      example_reference: "examples/community-draft-rjn/rain-5-axis.yaml"

  # クリップボード連携（macOS 専用）
  clipboard:
    enabled: true
    command: "pbcopy"

  # Studio 自動オープン（macOS 専用）
  studio_open:
    enabled: true
    url_template: "https://studio.youtube.com/channel/{channel_id}/community"
