# collection-ideate skill default config
#
# コレクション企画生成の設定。
# チャンネル側で config/skills/collection-ideate.yaml に上書き。

# 構図ロック (#489)
# true (デフォルト) のとき:
#   - differentiation_axes は「企画コンセプトの内部メタデータ」として扱い、
#     音楽プロンプト・概要欄訴求・タイトルバリエーションへ反映する。
#   - サムネ構図は TTP 参照画像 + objects.fixed で固定する。
#     differentiation_axes の値はサムネ生成プロンプトへ書き出さない。
#   - サムネ差別化は objects.swappable の slot 値のみで取る。
# false にすると従来どおり differentiation_axes をサムネ構図にも反映する
# (TTP のスタイルアンカーが効きにくくなるので非推奨)。
composition_lock: true

# 差別化軸 (企画候補生成時の軸)
# composition_lock=true のときはサムネ構図には反映されず、企画コンセプト
# (音楽 / 概要欄 / タイトル) の内部メタデータとしてのみ使われる。
differentiation_axes:
  - location
  - time_of_day
  - activity
  - mood

# プレビューサムネイル生成設定
preview:
  # サムネイル生成タイミング (#354 / #450)
  # 案数 N = candidate_count (下記キー)。
  # - parallel (デフォルト): テキスト N 案 → 確認 → N 枚一括生成 → 比較選択 → 採用 1 枚 planning-preview.png + 残り stock 退避
  #   planning-preview.png は企画参照素材。最終 thumbnail.jpg と textless main.png/jpg は後段 /thumbnail で別生成する。
  # - sequential: テキスト N 案 → 選択 → 選択 1 案だけ生成 (コスト 1/N の opt-in)
  thumbnail_mode: parallel
  # 1 回の /collection-ideate で生成する企画候補数 (テキスト案数 = 生成枚数)
  candidate_count: 3
  # セッション ID のバイト数 (hex 文字列化後の長さは 2 倍)
  session_id_bytes: 2
  # 企画選択後、不採用プレビューを assets/stock/<theme>/ に退避するか (#364)
  # false にすると従来通り単純削除 (rm -rf _plan-previews/<session>/)。
  # 退避自体の opt-out は config/skills/thumbnail.yaml の image_generation.stock.enabled が優先
  stock_archive: true
  # Deprecated: TTP strict preview では stock 参照を混ぜない。
  # 互換目的でキーは残すが、Phase 4-4 の生成手順では参照しない。
  stock_refs: false

# 差し替え可能オブジェクトの定義 (省略可、未定義時はサムネイル差別化は色・テーマのみ)
# 詳しい例は references/object-design-examples.md を参照
# objects:
#   swappable:
#     - slot: left_candle
#       description_template: "{color} glass jar with {texture}"
#       story_template: "{theme} に合わせた香りのキャンドル"
#     - slot: right_cocktail
#       description_template: "original cocktail called {name} — {color} liquid in {glass}"
#       story_template: "{persona} が {scene} で飲む一杯"
#   fixed:
#     - turntable
#     - rain_window

# オリジナリティルール
originality:
  # 競合既存タイトルとの類似度許容度 (0.0-1.0、低いほど厳しい)
  max_similarity: 0.5
  # 企画ごとに競合パターン参照元を必ず記録するか
  require_pattern_reference: true

# 生成後セルフチェック (#489)
# yt-thumbnail-check が読み取り、Gemini Vision で objects.fixed の構図条件と
# no_logo_guard.detect_text を検証する。Phase 4-4 の生成直後 / Phase 4-5 提示
# 前に自動実行する想定 (失敗時は再生成 or 警告表示)。
self_check:
  enabled: true
  # objects.fixed が定義されているとき、各要素を Gemini への verification
  # checklist に展開する。空 list だと checklist は no_logo_guard のみになる。
  verify_fixed_objects: true
  # 画像内のテキスト・ロゴ・透かしを検出して warn する。
  # (e.g. ジェット機の G700 ロゴ、ナンバープレートの数字、フォントテキスト等)
  no_logo_guard:
    detect_text: true
    detect_logo: true
    detect_watermark: true
  # 不合格時の再生成最大回数。0 にすると warn 表示のみで再生成しない。
  max_regeneration_attempts: 0
  # Gemini モデル (vision/text)。未指定なら video-analyze と同じデフォルトを使う。
  model: "gemini-2.5-flash"
