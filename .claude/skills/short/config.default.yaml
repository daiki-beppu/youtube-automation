# short skill default config
#
# ショート動画生成の設定。チャンネル側では config/skills/short.yaml に上書き値を置く。
#
# 注意: コンテンツモデル判定 (content_model.type) は upload など他スキルとも
# 共有するため channel_config.json 側で管理する。この YAML には short 固有の派生値のみ置く。

# モード A (collection): BGM テイスターのデフォルト
duration_sec: 20          # 1ショートあたりの尺
fade_in_sec: 1.0          # フェードイン秒数
fade_out_sec: 1.5         # フェードアウト秒数
default_count: 3          # 1コレクションから生成するショート本数
chapter_offset_sec: 30    # 各チャプター開始位置からのオフセット秒

# drawtext で使うフォントパス（macOS デフォルト）
font_path: "/System/Library/Fonts/Palatino.ttc"

# モード B (release): 話す系クリップのサビ抽出
release:
  start_sec: 30     # サビ開始位置
  duration_sec: 40  # 抽出する尺
