# video-description skill default config
#
# 概要欄生成の設定。チャンネル側では config/skills/video-description.yaml に上書き値を置く。
#
# 注意: tags.base / title.template / descriptions.opening / perfect_for / hashtags は
# 複数スキル（domains.metadata.service.BAHMetadataGenerator / short / upload 等）から参照される横断属性のため、
# 引き続き config/channel/*.json で管理する。ここには description 固有の派生マッピングのみ置く。

# チャプター（タイムスタンプ列）生成の有効 / 無効。
# false にすると、タイムスタンプ列の生成・重複トラック名の LLM リネーム・
# workflow-state.json への track_display_names 永続化をすべて skip する
# （BGM / ASMR 等、章運用を廃止したチャンネル向けの標準 opt-out）。
# 構造化メタブロック / Music Time セパレータ / playlist 名 / CTA / hashtag は
# false でも変わらず生成される。
chapters_enabled: true

# 概要欄セクションの装飾ヘッダー。チャンネル特性に応じて差し替え可能。
# `channel_link_template` は `{channel_name}` を含むテンプレート文字列。
# デフォルトは BGM チャンネル想定（絵文字 + 装飾罫線）。ゲーム音楽 / ASMR /
# トーク系などでチャンネル独自の装飾に差し替えたい場合は config/skills/video-description.yaml で上書きする。
section_headers:
  track_list: "⎯⎯⎯⎯ ✦ Track List ✦ ⎯⎯⎯⎯"
  usage_attribution: "📝 Usage & Attribution:"
  perfect_for: "🎮 Perfect for:"
  channel_link_template: "🔗 {channel_name}:"
  # pattern 切り替わりに挿入するテーマ見出し行の装飾。
  # 例: `── Pattern A: Awakening ──`（YouTube chapter parser に拾われないよう先頭 timestamp は持たない）。
  # チャンネル個性に合わせて prefix / suffix を上書きできる。
  theme_inline:
    prefix: "── "
    suffix: " ──"

# Usage & Attribution セクションの本文行（チャンネル単位で書き換え可能）。
usage_attribution_lines:
  - "• This music is original AI composition"
  - "• Free to use for personal & commercial projects"
  - "• Attribution appreciated but not required"
  - "• Redistribution as-is prohibited"

# テーマ→Perfect for 用途マッピング
# コレクション名と部分一致したキーの用途リストを採用する。
# 未マッチ時は config/channel/content.json の descriptions.perfect_for がフォールバック。
#
# 例:
# perfect_for_themes:
#   study:
#     - Late Night Study Sessions
#     - Focus & Concentration
#   sleep:
#     - Falling Asleep
#     - Insomnia Relief
#   tavern:
#     - Tabletop RPG Sessions
#     - Fantasy Reading
perfect_for_themes: {}

# テーマ別絵文字（descriptions.md にテーマ見出しを差し込むときに参照）
theme_emoji:
  study: "📚"
  sleep: "🌙"
  tavern: "🍺"
  ocean: "🌊"
  forest: "🌿"
  druid: "🔮"
  rain: "🌧️"
  hearth: "🔥"

# YouTube Studio の Card（手動設定）に含める定型メッセージ
cards:
  enabled: true
  timing: "12:00"
  text_template: "Up next from {channel_name}"
