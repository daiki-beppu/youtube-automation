# config/skills/suno.yaml テンプレ（チャンネル個別上書き）
#
# `/channel-setup` で `docs/channel/channel-direction.md` の決定を転記する。
# 同梱デフォルトは `.claude/skills/suno/config.default.yaml`。ここに置いたキーで
# deep-merge 上書きする。`music_engine: lyria` のチャンネルでは生成不要。

# Suno UI でこのチャンネル用に作る workspace 名
workspace_name: "{{WORKSPACE_NAME}}"

# Suno Styles 欄に入る共通プレフィックス（channel-direction.md の
# 「ジャンル & スタイル」決定をそのまま転写。チャンネル方向性を AI が
# 手書きしてしまうことを防ぐ唯一のソース）
genre_line: "{{GENRE_LINE}}"

# Suno Exclude Styles 欄。チャンネル方向性と相反するジャンルを列挙
exclude_styles: "{{EXCLUDE_STYLES}}"
