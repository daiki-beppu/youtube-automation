# config/skills/thumbnail.yaml テンプレ（チャンネル個別上書き）
#
# `/channel-setup` で `docs/channel/channel-direction.md` の TTP 決定を転記する。
# 同梱デフォルトは `.claude/skills/thumbnail/config.default.yaml`。ここに置いた
# キーで deep-merge 上書きする。
#
# 必須項目（空のまま channel-setup を抜けないこと）:
#   - image_generation.gemini.reference_images.default
#   - image_generation.gemini.brand_background
#   - image_generation.gemini.composition_rules.* （channel-direction で確定したもの）
#
# `reference_images.default` は `/benchmark` 取得済みの TTP 競合サムネを
# `data/thumbnail_compare/benchmark/<channel>-<vid>.jpg` 形式で並べる。
# `/channel-setup` 中に `yt-download-benchmark-thumbnails` 相当のステップで
# 自動 download される想定（手動 download を回避する導線、issue #567）。

image_generation:
  # GCP 課金なしで始める場合は codex を推奨。Gemini を使う場合は gemini に変更し、
  # ADC / GCP 課金が有効なことを確認する。
  # provider: codex

  codex:
    # 参照サムネを winning template として扱い、{title} だけを差し替える
    # 「TTPを徹底して上位互換の生成」用の短い既定プロンプト。
    default_prompt_template: |
      TTP this reference thumbnail, then improve it into a stronger original thumbnail.
      Keep the winning layout, typography feel, character scale, color mood, texture, and energy.
      Make it cleaner, more readable on mobile, stronger face impact, no logos, no watermarks, no broken hands.
      Use the title {title}.

  gemini:
    # チャンネル統一の背景色（channel-direction の「ビジュアルアイデンティティ」
    # から転写）
    brand_background: "{{BRAND_BACKGROUND}}"

    # TTP 参照画像（channel-direction で選定した TTP 対象の代表サムネ）。
    # path_base: channel_dir なので channel_dir からの相対パスで列挙する
    reference_images:
      default:
        - "{{REFERENCE_IMAGE_1}}"
        - "{{REFERENCE_IMAGE_2}}"
        - "{{REFERENCE_IMAGE_3}}"
      path_base: channel_dir
      notes: "{{TTP_NOTES}}"

    # 差分プロンプトのテンプレ（コレクション側 prompts/<theme>.md からの
    # 差分指示はここを起点に組み立てる）
    diff_prompt_template: "{{DIFF_PROMPT_TEMPLATE}}"

    # 構図・環境のルール（channel-direction の「ビジュアルアイデンティティ」
    # / 「サムネイル方針」を転写。空欄は不可）
    composition_rules:
      environment: "{{ENVIRONMENT}}"
      character_size: "{{CHARACTER_SIZE}}"
      character_pose: "{{CHARACTER_POSE}}"
      allowed_actions: "{{ALLOWED_ACTIONS}}"
      ng_actions: "{{NG_ACTIONS}}"
      background: "{{BACKGROUND}}"
      text_lines: "タイトルは 2 行以内"
      channel_branding: "{{CHANNEL_BRANDING}}"
