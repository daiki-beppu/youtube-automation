# Lefthook 設定（https://lefthook.dev）
#
# 有効化: devShell（`nix develop` / direnv `use flake`）に入ると flake.nix の
# shellHook が `lefthook install` を自動実行する。手動なら `lefthook install`。
#
# - pre-commit:
#   - Python: ruff の lint / format チェック
#   - TypeScript: oxlint / oxfmt --check / tsc -b --noEmit (ADR 0001)
# - pre-push:   CHANGELOG ゲート（CI の changelog ジョブをローカル再現）
#
# 個別スキップ: `LEFTHOOK=0 git push` で全 hook を無効化。
# CHANGELOG ゲートのみ省く: `SKIP_CHANGELOG=1 git push`

# use_stdin は lefthook 1.4.11、exclude の glob 配列は 1.5.0 で追加。古い lefthook は
# 未知 key / 未対応の値形式を黙って無視し判定が no-op になるため、最低バージョンを明示する
min_version: 1.5.0

pre-commit:
  parallel: true
  commands:
    ruff-check:
      glob: "*.py"
      run: uv run ruff check {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check {staged_files}
    # oxlint / oxfmt / typecheck は root ツールチェーン（ADR 0001）の対象のみに絞る。
    # extensions/ は自前の ESLint / Prettier / tsc 管理（CI: extensions.yml）であり、
    # oxlint.config.ts の ignorePatterns も extensions/** を除外しているため、staged files が
    # extensions のみだと oxlint / oxfmt が「対象ファイルなし」を exit 1 で返し commit が
    # 必ず落ちる (#1428)。exclude で staged files から外せば、対象 0 件のとき lefthook が
    # コマンドごと skip する。
    oxlint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      exclude:
        - "extensions/**"
      run: bunx oxlint {staged_files}
    oxfmt:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      # .claude/**（skill references の JSON 等）は oxfmt.config.ts の ignorePatterns で
      # 除外済みのため、staged files が .claude のみでも #1428 と同型の「対象ファイルなし」
      # で commit が落ちる。exclude を config 側の除外と揃える
      exclude:
        - "extensions/**"
        - "src/youtube_automation/**"
        - "tests/**"
        - "examples/**"
        - "auth/**"
        - "poc/**"
        - ".claude/**"
        - ".takt/**"
      run: bunx oxfmt --check {staged_files}
    typecheck:
      # root の tsc -b は extensions を含まないため、extensions のみの変更では起動しない
      glob: "*.{ts,tsx}"
      exclude:
        - "extensions/**"
      run: bun run typecheck

pre-push:
  commands:
    changelog-gate:
      # git が stdin に渡す "<local ref> <local sha> <remote ref> <remote sha>" を
      # スクリプトへ転送する（ブランチ削除 push の判定に必要）。
      # 注意: lefthook の仕様で use_stdin を持つコマンドが同一 hook に複数あると
      # stdin を受け取れるのは 1 つだけ。pre-push に stdin を使うコマンドを
      # 追加するときはこのゲートの削除 push スキップが壊れないか確認すること
      use_stdin: true
      run: bash .lefthook/pre-push/changelog-gate.sh
