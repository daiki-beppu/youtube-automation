<!doctype html>
<!--
  distrokid.com/new（アルバムモード howmanysongs=2）を実機 DOM に基づいてミラーしたモック
  （#866 で AI 開示部分を実 DOM 準拠に再構築）。

    - #artistName は type=hidden（/new に可視入力欄なし → 注入対象外、visibility で排除）
    - #language / #genrePrimary / #genreSecondary は SELECT
    - 曲タイトルは [name="title_<uuid>"]（DOM order で track を解決）
    - songwriter は track 別 3 分割: songwriter_real_name_{first,middle,last}<N>（N=1-based）
    - 曲アップロードは #js-track-upload-<N>（name="file"、1-indexed pre-mount）
    - #albumTitleInput はアルバム時のみ存在（シングルモードでは無い）
    - リリース日は #release-date-dp（name="releaseDate"、type=date）
    - ジャケットは #artwork（name="artwork"、hidden file input）
    - previouslyReleased は value="0"（いいえ）を checked（新規リリース前提）
    - AI 開示は track 単位の ai_gate radio + ai_lyrics / ai_music checkbox + ai_partial_audio_type radio。
      title / ai_gate / ai_lyrics / ai_music / ai_partial_audio_type はすべて同じ UUID を共有する。
      初期は「いいえ」が checked、歌詞/作曲 checkbox と partial_audio_type radio は display:none の親で隠れる。
      「はい」を click すると親の display:none が外れる（実 UI の挙動を模す）。
-->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>DistroKid New Release album mock</title>
  </head>
  <body>
    <form id="release-form">
      <!-- アカウント設定で事前登録される暗黙値。/new には hidden のみ（注入対象外）。 -->
      <input id="artistName" name="artistName" type="hidden" value="City Nights" />

      <select id="language" name="language">
        <option value="">--</option>
        <option value="ja">Japanese</option>
        <option value="en">English</option>
      </select>

      <select id="genrePrimary" name="genre1">
        <option value="">--</option>
        <option value="Electronic">Electronic</option>
        <option value="Pop">Pop</option>
      </select>

      <select id="genreSecondary" name="genre2">
        <option value="">--</option>
        <option value="House">House</option>
      </select>

      <!-- アルバム時のみ存在。シングルモードのモックでは削除する。 -->
      <input id="albumTitleInput" name="albumtitle" type="text" />

      <input id="release-date-dp" name="releaseDate" type="date" />

      <!-- ジャケット（hidden file input） -->
      <input id="artwork" name="artwork" type="file" />

      <!-- Track 1 -->
      <fieldset data-track="1">
        <input name="title_uuid-track-1" type="text" />
        <input name="songwriter_real_name_first1" type="text" />
        <input name="songwriter_real_name_middle1" type="text" />
        <input name="songwriter_real_name_last1" type="text" />
        <input id="js-track-upload-1" name="file" type="file" />
        <label
          ><input type="radio" name="previouslyReleased_uuid-track-1" value="0" checked />
          いいえ</label
        >
        <label
          ><input type="radio" name="previouslyReleased_uuid-track-1" value="1" />
          はい</label
        >
        <!-- AI 開示 (実 DOM 準拠) -->
        <div class="ai-credits-gate-row">
          <label
            ><input type="radio" name="ai_gate_uuid-track-1" value="0" checked />
            いいえ</label
          >
          <label
            ><input type="radio" name="ai_gate_uuid-track-1" value="1" /> はい</label
          >
        </div>
        <div class="ai-credits-options" data-track-options="1" style="display: none">
          <label><input type="checkbox" name="ai_lyrics_uuid-track-1" /> 歌詞</label>
          <label><input type="checkbox" name="ai_music_uuid-track-1" /> 作曲</label>
          <div
            id="ai-partial-audio-type-1"
            class="ai-credits-partial-type"
            style="display: none"
          >
            <label
              ><input
                type="radio"
                name="ai_partial_audio_type_uuid-track-1"
                value="vocals"
              />
              ボーカル</label
            >
            <label
              ><input
                type="radio"
                name="ai_partial_audio_type_uuid-track-1"
                value="instruments"
              />
              楽器</label
            >
          </div>
        </div>
      </fieldset>

      <!-- Track 2 -->
      <fieldset data-track="2">
        <input name="title_uuid-track-2" type="text" />
        <input name="songwriter_real_name_first2" type="text" />
        <input name="songwriter_real_name_middle2" type="text" />
        <input name="songwriter_real_name_last2" type="text" />
        <input id="js-track-upload-2" name="file" type="file" />
        <label
          ><input type="radio" name="previouslyReleased_uuid-track-2" value="0" checked />
          いいえ</label
        >
        <label
          ><input type="radio" name="previouslyReleased_uuid-track-2" value="1" />
          はい</label
        >
        <!-- AI 開示 (実 DOM 準拠) -->
        <div class="ai-credits-gate-row">
          <label
            ><input type="radio" name="ai_gate_uuid-track-2" value="0" checked />
            いいえ</label
          >
          <label
            ><input type="radio" name="ai_gate_uuid-track-2" value="1" /> はい</label
          >
        </div>
        <div class="ai-credits-options" data-track-options="2" style="display: none">
          <label><input type="checkbox" name="ai_lyrics_uuid-track-2" /> 歌詞</label>
          <label><input type="checkbox" name="ai_music_uuid-track-2" /> 作曲</label>
          <div
            id="ai-partial-audio-type-2"
            class="ai-credits-partial-type"
            style="display: none"
          >
            <label
              ><input
                type="radio"
                name="ai_partial_audio_type_uuid-track-2"
                value="vocals"
              />
              ボーカル</label
            >
            <label
              ><input
                type="radio"
                name="ai_partial_audio_type_uuid-track-2"
                value="instruments"
              />
              楽器</label
            >
          </div>
        </div>
      </fieldset>

      <button id="continue" type="button">続ける</button>
    </form>

    <script>
      // 「続ける」が拡張から押されていないことを e2e で検証するためのフラグ。
      window.__continueClicked = false;
      document.getElementById("continue").addEventListener("click", () => {
        window.__continueClicked = true;
      });

      // ai_gate「はい」radio 選択時に options 親の display:none を外す（実 UI の展開挙動を模す）。
      document
        .querySelectorAll('input[type="radio"][name^="ai_gate_"][value="1"]')
        .forEach((radio) => {
          radio.addEventListener("change", (e) => {
            if (!e.target.checked) return;
            const track = e.target.closest("fieldset");
            const options = track.querySelector(".ai-credits-options");
            if (options) options.style.display = "";
          });
        });
    </script>
  </body>
</html>
