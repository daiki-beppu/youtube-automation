<!doctype html>
<!--
  distrokid.com/new を実機 DOM に基づいてミラーしたモック（#877 modal / #888 段階的 trigger・
  トラック数 select・Apple Music クレジット）。

    - #artistName は type=hidden（/new に可視入力欄なし → 注入対象外、visibility で排除）。
      Apple Music クレジットの演奏者 / プロデューサー名はこの値を使う（#888）。
    - #language / #genrePrimary / #genreSecondary は SELECT
    - トラック数は #howManySongsOnThisAlbum（name="howmanysongs"）SELECT で選ぶ（#888）。
      change で changedSongCount() が track 行と credit 入力欄を再生成する（実 UI の挙動を模す）。
    - 曲タイトルは [name="title_<uuid>"]（DOM order で track を解決）
    - songwriter は track 別 3 分割: songwriter_real_name_{first,middle,last}<N>（N=1-based）
    - 曲アップロードは #js-track-upload-<N>（name="file"、1-indexed）
    - #albumTitleInput はアルバム時（曲数 > 1）のみ表示
    - リリース日は #release-date-dp（name="releaseDate"、type=date）
    - ジャケットは #artwork（name="artwork"、hidden file input）
    - previouslyReleased は value="0"（いいえ）を checked（新規リリース前提）
    - Apple Music クレジット（#888）: トップレベルの .requirements-item-title「クレジットを追加」を
      click すると全 track の credit-input-container が visible 化する。各 track の入力欄は
      #track-{N}-performer-1-name / #track-{N}-producer-1-name（DOM 上に事前生成、初期は hidden）。
    - AI 開示は track 単位の ai_gate radio（初期「いいえ」checked）。「はい」を click すると
      SweetAlert2 ベースの modal (.ai-credits-swal-modal) が body に mount する。
      modal 内に歌詞 / 作曲 checkbox・録音範囲 radio (.distroAiRecordingScope[track][value]、name は null)・
      apply-all (#ai-apply-all-1、曲数 > 1 のみ)・保存/キャンセル button を持つ。
      録音範囲 full を check すると #ai-artist-questions-1 に artist_persona radio が dynamic inject される（#888）。
      「保存」で modal を unmount し、apply-all が入っていれば全 track の ai_gate「はい」を checked にする。
-->
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>DistroKid New Release mock</title>
    <style>
      .credit-input-container[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <form id="release-form">
      <!-- アカウント設定で事前登録される暗黙値。/new には hidden のみ（注入対象外・credit 名に使用）。 -->
      <input id="artistName" name="artistName" type="hidden" value="Soulful Grooves" />

      <select id="language" name="language">
        <option value="">--</option>
        <option value="ja">Japanese</option>
        <option value="en">English</option>
      </select>

      <select id="genrePrimary" name="genre1">
        <option value="">--</option>
        <option value="Electronic">Electronic</option>
        <option value="Pop">Pop</option>
      </select>

      <select id="genreSecondary" name="genre2">
        <option value="">--</option>
        <option value="House">House</option>
      </select>

      <!-- アルバム時（曲数 > 1）のみ表示。 -->
      <input id="albumTitleInput" name="albumtitle" type="text" hidden />

      <input id="release-date-dp" name="releaseDate" type="date" />

      <!-- ジャケット（hidden file input） -->
      <input id="artwork" name="artwork" type="file" />

      <!-- トラック数 select（#888）。change で track 行 + credit 欄を再生成する。 -->
      <select id="howManySongsOnThisAlbum" name="howmanysongs" onchange="changedSongCount()">
        <option value="1">1曲（シングル）</option>
        <option value="2">2曲</option>
        <option value="3">3曲</option>
      </select>

      <!-- track 行はここに生成される。 -->
      <div id="tracks"></div>

      <!-- Apple Music クレジット（#888 / #923）。初期は hidden（Apple Music unchecked なので）。 -->
      <div class="requirements-item" hidden>
        <div class="requirements-item-title">クレジットを追加</div>
        <div id="credit-containers"></div>
      </div>

      <!-- 配信先ストア（実 DOM 準拠 #923）。実配信先は id^="chk"、upsell は id なし。初期は unchecked（クリア済み最悪状態再現）。 -->
      <label><input type="checkbox" name="store" id="chkspotify" value="spotify" class="distroStore" />Spotify</label>
      <label
        ><input type="checkbox" name="store" id="chkapplemusic" value="applemusic" class="distroStore" />Apple
        Music</label
      >
      <label><input type="checkbox" name="store" id="chkitunes" value="itunes" class="distroStore" />iTunes</label>
      <label
        ><input type="checkbox" name="store" id="chkgoogle" value="google" class="distroStore" />YouTube Music</label
      >
      <label><input type="checkbox" name="store" id="chksnap" value="snap" class="distroStore" />Snapchat</label>
      <label><input type="checkbox" name="store" id="chkroblox" value="roblox" class="distroStore" />Roblox</label>
      <label><input type="checkbox" name="store" id="chktiktok" value="tiktok" class="distroStore" />TikTok</label>
      <!-- upsell（id なし）: Discovery Pack（shazam）/ Audiomack -->
      <label
        ><input
          type="checkbox"
          name="store"
          value="shazam"
          class="distroStore"
        />ディスカバリーパック（24.75ドル／年）</label
      >
      <label
        ><input
          type="checkbox"
          name="store"
          value="audiomack"
          class="distroStore js-audiomackExtraCheckbox"
        />Audiomack（無料）</label
      >

      <!-- オプション (upsell) extras checkbox 群（#919）。フィル時に強制 uncheck で \$0 保証。 -->
      <label><input type="checkbox" name="extras" />レガシーパック（49ドル）</label>
      <label><input type="checkbox" name="extras" />ストアマキシマイザー（7.95ドル／年）</label>

      <!-- 重要事項 checkbox（#923）。required 4 個は常時可視。conditional は ストア連動で可視化。 -->
      <label
        ><input
          type="checkbox"
          class="areyousure"
          id="areyousurepromoservices"
        />再生回数増加サービスを利用しません</label
      >
      <label><input type="checkbox" class="areyousure" id="areyousurerecorded" />自己レコーディングです</label>
      <label><input type="checkbox" class="areyousure" id="areyousureotherartist" />他アーティスト名は使いません</label>
      <!-- conditional: areyousureyoutube (hidden initially, shown when chkgoogle checked) -->
      <label id="label-areyousureyoutube" hidden
        ><input type="checkbox" class="areyousure" id="areyousureyoutube" />YouTube Music 配信同意</label
      >
      <label id="label-areyousuresnap" hidden
        ><input type="checkbox" class="areyousure" id="areyousuresnap" />Snapchat 配信同意</label
      >

      <!-- DistroKid 利用規約同意 checkbox（#919）。フィル時に強制 check。 -->
      <label
        ><input type="checkbox" class="areyousure" id="areyousuretandc" />DistroKid
        ディストリビューション規約に同意します</label
      >

      <button id="continue" type="button">続ける</button>
      <button id="doneButton" type="button" class="distroDoneButtonWithAPI btn info">続ける</button>
    </form>

    <script>
      // 「続ける」が拡張から押されていないことを e2e で検証するためのフラグ。
      window.__continueClicked = false;
      document.getElementById("continue").addEventListener("click", () => {
        window.__continueClicked = true;
      });

      // 指定曲数ぶんの track 行を生成する（title / songwriter / file / previouslyReleased / ai_gate）。
      function renderTracks(count) {
        const tracks = document.getElementById("tracks");
        tracks.innerHTML = "";
        for (let n = 1; n <= count; n += 1) {
          const uuid = "uuid-track-" + n;
          const fs = document.createElement("fieldset");
          fs.setAttribute("data-track", String(n));
          fs.innerHTML = [
            '<input name="title_' + uuid + '" type="text" />',
            '<input name="songwriter_real_name_first' + n + '" type="text" />',
            '<input name="songwriter_real_name_middle' + n + '" type="text" />',
            '<input name="songwriter_real_name_last' + n + '" type="text" />',
            '<input id="js-track-upload-' + n + '" name="file" type="file" />',
            '<label><input type="radio" name="previouslyReleased_' + uuid + '" value="0" checked /> いいえ</label>',
            '<label><input type="radio" name="previouslyReleased_' + uuid + '" value="1" /> はい</label>',
            '<div class="ai-credits-gate-row">',
            '<label><input type="radio" name="ai_gate_' + uuid + '" value="0" checked /> いいえ</label>',
            '<label><input type="radio" name="ai_gate_' + uuid + '" value="1" /> はい</label>',
            "</div>",
          ].join("");
          tracks.appendChild(fs);
        }
        wireGates();
      }

      // 全 track の credit 入力欄を事前生成する（初期は hidden、トリガー click で visible 化）。
      // #919: role 欄も含める（performer 86 options のサブセット / producer 40 options のサブセット）。
      // 実機の `dk-searchable-select__native` は display:none で隠されるが、e2e fixture では簡略化のため
      // 通常の `<select>` として置く（fail-loud / setSelectValue の挙動は jsdom 側で担保済み）。
      function renderCredits(count) {
        const root = document.getElementById("credit-containers");
        root.innerHTML = "";
        const perfOpts =
          '<option value="unselected">担当を選択</option>' +
          '<option value="Audio">オーディオ</option>' +
          '<option value="Synthesizer">シンセサイザー</option>';
        const prodOpts =
          '<option value="unselected">担当を選択</option>' +
          '<option value="Producer">プロデューサー</option>' +
          '<option value="Executive producer">エグゼクティブプロデューサー</option>';
        for (let n = 1; n <= count; n += 1) {
          const container = document.createElement("div");
          container.className = "credit-input-container";
          container.hidden = true;
          container.innerHTML = [
            '<input type="text" name="performer-name" id="track-' +
              n +
              '-performer-1-name" class="performer-name coolInput" placeholder="名前" />',
            '<select id="track-' +
              n +
              '-performer-1-role" class="performer-role coolInput dk-searchable-select__native">' +
              perfOpts +
              "</select>",
            '<input type="text" name="producer-name" id="track-' +
              n +
              '-producer-1-name" class="producer-name coolInput" placeholder="名前" />',
            '<select id="track-' +
              n +
              '-producer-1-role" class="producer-role coolInput dk-searchable-select__native">' +
              prodOpts +
              "</select>",
          ].join("");
          root.appendChild(container);
        }
      }

      // 曲数変更（#888）: track 行 + credit 欄を再生成し、album 時のみアルバム名欄を表示する。
      function changedSongCount() {
        const count = parseInt(document.getElementById("howManySongsOnThisAlbum").value, 10);
        document.getElementById("albumTitleInput").hidden = count <= 1;
        renderTracks(count);
        renderCredits(count);
      }

      // Apple Music「クレジットを追加」トリガー: 全 credit-input-container を visible 化する。
      document.querySelector(".requirements-item-title").addEventListener("click", () => {
        document.querySelectorAll(".credit-input-container").forEach((c) => {
          c.hidden = false;
        });
      });

      // ai_gate「はい」click で SweetAlert2 modal を mount する。曲数 > 1 のとき apply-all を含める。
      function buildAiModal(uuid) {
        const album = parseInt(document.getElementById("howManySongsOnThisAlbum").value, 10) > 1;
        const modal = document.createElement("div");
        modal.className = "ai-credits-swal-modal";
        modal.setAttribute("role", "dialog");
        modal.innerHTML = [
          '<div class="swal2-content"><div class="ai-credits-swal-html">',
          '<div id="ai-details-1" class="ai-credits-details">',
          '<label><input type="checkbox" class="distroAiLyrics" name="ai_lyrics_' + uuid + '" /> 歌詞</label>',
          '<label><input type="checkbox" class="distroAiMusic" name="ai_music_' + uuid + '" /> 作曲</label>',
          // 録音範囲 radio は name=null、class + track + value で紐付ける（#888）。
          '<label><input type="radio" class="distroAiRecordingScope" track="1" value="full" /> 音声すべて</label>',
          '<label><input type="radio" class="distroAiRecordingScope" track="1" value="partial" /> 音声の一部</label>',
          '<label class="partial-type" hidden><input type="radio" class="distroAiPartialAudioType" name="ai_partial_audio_type_' +
            uuid +
            '" value="vocals" /> ボーカル</label>',
          '<label class="partial-type" hidden><input type="radio" class="distroAiPartialAudioType" name="ai_partial_audio_type_' +
            uuid +
            '" value="instruments" /> 楽器</label>',
          // persona は full check で dynamic inject される（初期は空）。
          '<div id="ai-artist-questions-1"></div>',
          album ? '<label><input type="checkbox" id="ai-apply-all-1" /> すべての曲に適用</label>' : "",
          "</div></div></div>",
          '<div class="swal2-actions">',
          '<button type="button" class="swal2-cancel ai-modal-btn-cancel">キャンセル</button>',
          '<button type="button" class="swal2-confirm ai-modal-btn-save">保存する</button>',
          "</div>",
        ].join("");

        // 録音範囲 full を check すると persona radio を #ai-artist-questions-1 に dynamic inject する（#888）。
        modal.querySelector('.distroAiRecordingScope[value="full"]').addEventListener("change", (e) => {
          if (!e.target.checked) return;
          const q = modal.querySelector("#ai-artist-questions-1");
          if (q.querySelector('[name^="ai_artist_persona_"]')) return;
          q.innerHTML = [
            '<label><input type="radio" class="distroAiArtistPersona" name="ai_artist_persona_' +
              uuid +
              '_0" value="0" /> 人間</label>',
            '<label><input type="radio" class="distroAiArtistPersona" name="ai_artist_persona_' +
              uuid +
              '_0" value="1" /> AIペルソナ</label>',
          ].join("");
        });

        // 録音範囲 partial を check すると種別 radio を visible 化する（#888）。
        modal.querySelector('.distroAiRecordingScope[value="partial"]').addEventListener("change", (e) => {
          if (!e.target.checked) return;
          modal.querySelectorAll(".partial-type").forEach((el) => (el.hidden = false));
        });

        // 保存: modal を閉じ、apply-all なら全 track の ai_gate「はい」を checked にする。
        modal.querySelector(".ai-modal-btn-save").addEventListener("click", () => {
          const applyAll = modal.querySelector("#ai-apply-all-1");
          if (applyAll && applyAll.checked) {
            document.querySelectorAll('input[type="radio"][name^="ai_gate_"][value="1"]').forEach((yes) => {
              yes.checked = true;
            });
          }
          modal.remove();
        });
        modal.querySelector(".ai-modal-btn-cancel").addEventListener("click", () => modal.remove());
        return modal;
      }

      // 各 track の ai_gate「はい」に modal mount 配線を張る（行再生成のたびに呼ぶ）。
      function wireGates() {
        document.querySelectorAll('input[type="radio"][name^="ai_gate_"][value="1"]').forEach((radio) => {
          radio.addEventListener("click", (e) => {
            if (document.querySelector(".ai-credits-swal-modal")) return;
            const name = e.target.getAttribute("name"); // ai_gate_<uuid>
            const uuid = name.slice("ai_gate_".length);
            document.body.appendChild(buildAiModal(uuid));
          });
        });
      }

      // 初期描画（既定は 1 曲 = シングル）。
      changedSongCount();

      // chkapplemusic check/uncheck で credit section の visibility を連動する（#923）。
      document.querySelector("#chkapplemusic").addEventListener("change", function () {
        document.querySelector(".requirements-item").hidden = !this.checked;
      });

      // chkgoogle check で areyousureyoutube を visible 化
      document.querySelector("#chkgoogle").addEventListener("change", function () {
        document.querySelector("#label-areyousureyoutube").hidden = !this.checked;
      });

      // chksnap check で areyousuresnap を visible 化
      document.querySelector("#chksnap").addEventListener("change", function () {
        document.querySelector("#label-areyousuresnap").hidden = !this.checked;
      });
    </script>
  </body>
</html>
