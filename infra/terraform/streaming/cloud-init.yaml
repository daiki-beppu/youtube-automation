#cloud-config
ssh_pwauth: false
ssh_keys:
  ed25519_private: |
    ${replace(trimspace(ssh_host_private_key), "\n", "\n    ")}
  ed25519_public: ${trimspace(ssh_host_public_key)}
package_update: true
package_upgrade: true
packages:
  - ffmpeg
  - cron
  - unattended-upgrades

runcmd:
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl reload ssh || systemctl reload sshd
  - dpkg-reconfigure --priority=low unattended-upgrades
  - install -d -m 0755 -o root -g root /opt/youtube-stream/videos
  - install -d -m 0755 -o root -g root /opt/youtube-stream/logs
  # bin/ は terraform の provisioner "file" がスクリプトを upload する宛先。
  # SFTP は親ディレクトリを自動作成しないため、cloud-init の段階で先に作っておく。
  - install -d -m 0755 -o root -g root /opt/youtube-stream/bin
