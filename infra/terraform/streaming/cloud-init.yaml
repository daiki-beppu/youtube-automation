#cloud-config
package_update: true
packages:
  - ffmpeg
  - cron

write_files:
  - path: /etc/systemd/system/youtube-stream.service
    owner: root:root
    permissions: '0644'
    content: |
      ${indent(6, systemd_unit)}

runcmd:
  - install -d -m 0755 -o root -g root /opt/youtube-stream/videos
  - install -d -m 0755 -o root -g root /opt/youtube-stream/logs
  # bin/ は terraform の provisioner "file" がスクリプトを upload する宛先。
  # SFTP は親ディレクトリを自動作成しないため、cloud-init の段階で先に作っておく。
  - install -d -m 0755 -o root -g root /opt/youtube-stream/bin
  - systemctl daemon-reload
