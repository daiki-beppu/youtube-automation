name: Extensions

on:
  push:
    branches: [main]
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"
      - ".github/scripts/classify-ci-paths.sh"
      - "tests/test_actions_parallel_workflows.py"
      - "flake.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"
      - ".github/scripts/classify-ci-paths.sh"
      - "tests/test_actions_parallel_workflows.py"
      - "flake.nix"
      - "flake.lock"

# main への push は cancel-in-progress の対象外（デプロイ相当の run を途中で殺さない）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      suno: ${{ steps.classify.outputs.suno }}
      distrokid: ${{ steps.classify.outputs.distrokid }}
      community: ${{ steps.classify.outputs.community }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
            separator="..."
          else
            base="$PUSH_BEFORE_SHA"
            head="$PUSH_HEAD_SHA"
            separator=".."
          fi
          case "$base" in
            "" | 0000000000000000000000000000000000000000)
              base="${head}^"
              separator=".."
              ;;
          esac
          git diff --name-only "${base}${separator}${head}" > "$RUNNER_TEMP/changed-paths.txt"
          bash .github/scripts/classify-ci-paths.sh "$RUNNER_TEMP/changed-paths.txt" | tee -a "$GITHUB_OUTPUT"

  check:
    needs: changes
    if: needs.changes.outputs.suno == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/suno-helper
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - name: Install dependencies
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Install DistroKid helper dependencies for cross-extension audit
        working-directory: extensions/distrokid-helper
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Install community helper dependencies for cross-extension audit
        working-directory: extensions/community-helper
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Install shared lint toolchain
        working-directory: extensions
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Fallow audit
        if: github.event_name == 'pull_request'
        env:
          FALLOW_AUDIT_BASE: ${{ github.event.pull_request.base.sha }}
        run: nix develop .#extensions --command pnpm run audit
      - parallel:
          - name: Check (Oxlint + Oxfmt)
            run: nix develop .#extensions --command pnpm check
          - name: Type check
            run: nix develop .#extensions --command pnpm compile
          - name: Unit tests (Vitest)
            run: nix develop .#extensions --command pnpm test
      - parallel:
          - name: Build
            run: nix develop .#extensions --command pnpm build
          - name: Install Playwright browser
            run: nix develop .#extensions --command pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          nix develop .#extensions --command node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab", "downloads", "debugger", "scripting", "notifications"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
          '
      - name: E2E tests (Playwright)
        run: nix develop .#extensions --command xvfb-run -a pnpm test:e2e

  distrokid-helper:
    needs: changes
    if: needs.changes.outputs.distrokid == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/distrokid-helper
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - name: Install dependencies
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Install shared lint toolchain
        working-directory: extensions
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - parallel:
          - name: Check (Oxlint + Oxfmt)
            run: nix develop .#extensions --command pnpm check
          - name: Typecheck
            run: nix develop .#extensions --command pnpm compile
          - name: Unit tests (Vitest)
            run: nix develop .#extensions --command pnpm test
      - parallel:
          - name: Build
            run: nix develop .#extensions --command pnpm build
          - name: Install Playwright browser
            run: nix develop .#extensions --command pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          nix develop .#extensions --command node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
            const expectedHosts = [
              "*://*.distrokid.com/*",
              "http://*.localhost/*",
              "http://localhost/*",
              "http://127.0.0.1/*",
            ];
            const actualHosts = manifest.host_permissions ?? [];
            const sameHosts =
              actualHosts.length === expectedHosts.length &&
              expectedHosts.every((p) => actualHosts.includes(p));
            if (!sameHosts) {
              console.error("生成 manifest の host_permissions が DistroKid + ローカル配信元と不一致:", actualHosts);
              process.exit(1);
            }
            const expectedContentScriptMatches = ["*://*.distrokid.com/new*"];
            const contentScripts = manifest.content_scripts ?? [];
            const actualContentScriptMatches = contentScripts.flatMap(
              (script) => script.matches ?? [],
            );
            const sameContentScriptMatches =
              actualContentScriptMatches.length === expectedContentScriptMatches.length &&
              expectedContentScriptMatches.every((p) => actualContentScriptMatches.includes(p));
            if (!sameContentScriptMatches) {
              console.error("生成 manifest の content_scripts.matches が DistroKid /new 限定と不一致:", actualContentScriptMatches);
              process.exit(1);
            }
          '
      - name: E2E (Playwright)
        run: nix develop .#extensions --command xvfb-run -a pnpm test:e2e

  community-helper:
    needs: changes
    if: needs.changes.outputs.community == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/community-helper
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - name: Install dependencies
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Install shared lint toolchain
        working-directory: extensions
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - parallel:
          - name: Check (Oxlint + Oxfmt)
            run: nix develop .#extensions --command pnpm check
          - name: Typecheck
            run: nix develop .#extensions --command pnpm compile
          - name: Unit tests (Vitest)
            run: nix develop .#extensions --command pnpm test
      - parallel:
          - name: Build
            run: nix develop .#extensions --command pnpm build
          - name: Install Playwright browser
            run: nix develop .#extensions --command pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          nix develop .#extensions --command node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
            const expectedHosts = [
              "http://*.localhost/*",
              "http://localhost/*",
              "http://127.0.0.1/*",
            ];
            const actualHosts = manifest.host_permissions ?? [];
            const sameHosts =
              actualHosts.length === expectedHosts.length &&
              expectedHosts.every((p) => actualHosts.includes(p));
            if (!sameHosts) {
              console.error("生成 manifest の host_permissions がローカル配信元限定と不一致:", actualHosts);
              process.exit(1);
            }
            const expectedContentScriptMatches = ["https://www.youtube.com/channel/*/posts*"];
            const contentScripts = manifest.content_scripts ?? [];
            const actualContentScriptMatches = contentScripts.flatMap(
              (script) => script.matches ?? [],
            );
            const sameContentScriptMatches =
              actualContentScriptMatches.length === expectedContentScriptMatches.length &&
              expectedContentScriptMatches.every((p) => actualContentScriptMatches.includes(p));
            if (!sameContentScriptMatches) {
              console.error("生成 manifest の content_scripts.matches が YouTube 投稿ページ限定と不一致:", actualContentScriptMatches);
              process.exit(1);
            }
          '
      - name: E2E (Playwright)
        run: nix develop .#extensions --command xvfb-run -a pnpm test:e2e
