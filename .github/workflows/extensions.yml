name: Extensions

on:
  push:
    branches: [main, feat/1143-suno-bulk-download]
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"
      - "tests/test_actions_parallel_workflows.py"
      - "flake.nix"
      - "flake.lock"
  pull_request:
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"
      - "tests/test_actions_parallel_workflows.py"
      - "flake.nix"
      - "flake.lock"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/suno-helper
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v30
      - name: Install dependencies
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - name: Fallow audit
        if: github.event_name == 'pull_request'
        env:
          FALLOW_AUDIT_BASE: ${{ github.event.pull_request.base.sha }}
        run: nix develop .#extensions --command pnpm run audit
      - parallel:
          - name: Lint
            run: nix develop .#extensions --command pnpm lint
          - name: Format check
            run: nix develop .#extensions --command pnpm format:check
          - name: Type check
            run: nix develop .#extensions --command pnpm compile
          - name: Unit tests (Vitest)
            run: nix develop .#extensions --command pnpm test
      - parallel:
          - name: Build
            run: nix develop .#extensions --command pnpm build
          - name: Install Playwright browser
            run: nix develop .#extensions --command pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          nix develop .#extensions --command node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab", "downloads", "debugger", "scripting"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
          '
      - name: E2E tests (Playwright)
        run: nix develop .#extensions --command xvfb-run -a pnpm test:e2e

  distrokid-helper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/distrokid-helper
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Install dependencies
        run: nix develop .#extensions --command pnpm install --frozen-lockfile
      - parallel:
          - name: Lint
            run: nix develop .#extensions --command pnpm lint
          - name: Format check
            run: nix develop .#extensions --command pnpm format:check
          - name: Typecheck
            run: nix develop .#extensions --command pnpm compile
          - name: Unit tests (Vitest)
            run: nix develop .#extensions --command pnpm test
      - parallel:
          - name: Build
            run: nix develop .#extensions --command pnpm build
          - name: Install Playwright browser
            run: nix develop .#extensions --command pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          nix develop .#extensions --command node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
            const expectedHosts = [
              "*://*.distrokid.com/*",
              "http://*.localhost/*",
              "http://localhost/*",
              "http://127.0.0.1/*",
            ];
            const actualHosts = manifest.host_permissions ?? [];
            const sameHosts =
              actualHosts.length === expectedHosts.length &&
              expectedHosts.every((p) => actualHosts.includes(p));
            if (!sameHosts) {
              console.error("生成 manifest の host_permissions が DistroKid + ローカル配信元と不一致:", actualHosts);
              process.exit(1);
            }
            const expectedContentScriptMatches = ["*://*.distrokid.com/new*"];
            const contentScripts = manifest.content_scripts ?? [];
            const actualContentScriptMatches = contentScripts.flatMap(
              (script) => script.matches ?? [],
            );
            const sameContentScriptMatches =
              actualContentScriptMatches.length === expectedContentScriptMatches.length &&
              expectedContentScriptMatches.every((p) => actualContentScriptMatches.includes(p));
            if (!sameContentScriptMatches) {
              console.error("生成 manifest の content_scripts.matches が DistroKid /new 限定と不一致:", actualContentScriptMatches);
              process.exit(1);
            }
          '
      - name: E2E (Playwright)
        run: nix develop .#extensions --command xvfb-run -a pnpm test:e2e
