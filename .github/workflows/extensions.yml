name: Extensions

on:
  push:
    branches: [main, feat/1143-suno-bulk-download]
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"
  pull_request:
    paths:
      - "extensions/**"
      - ".github/workflows/extensions.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/suno-helper
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: extensions/suno-helper/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace
      - parallel:
          - name: Lint
            run: pnpm lint
          - name: Format check
            run: pnpm format:check
          - name: Type check
            run: pnpm compile
          - name: Unit tests (Vitest)
            run: pnpm test
      - parallel:
          - name: Build
            run: pnpm build
          - name: Install Playwright browser
            run: pnpm exec playwright install --with-deps chromium
      - name: Verify generated manifest permissions (least-privilege)
        run: |
          node --input-type=module -e '
            import { readFileSync } from "node:fs";
            const manifest = JSON.parse(
              readFileSync(".output/chrome-mv3/manifest.json", "utf8"),
            );
            const expected = ["storage", "activeTab", "tabs", "downloads", "debugger"];
            const actual = manifest.permissions ?? [];
            const same =
              actual.length === expected.length &&
              expected.every((p) => actual.includes(p));
            if (!same) {
              console.error("生成 manifest の permissions が最小権限と不一致:", actual);
              process.exit(1);
            }
          '
      - name: E2E tests (Playwright)
        run: pnpm test:e2e

  distrokid-helper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/distrokid-helper
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: extensions/distrokid-helper/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace
      - parallel:
          - name: Lint
            run: pnpm lint
          - name: Format check
            run: pnpm format:check
          - name: Typecheck
            run: pnpm compile
          - name: Unit tests (Vitest)
            run: pnpm test
      - parallel:
          - name: Build
            run: pnpm build
          - name: Install Playwright browser
            run: pnpm exec playwright install --with-deps chromium
      - name: E2E (Playwright)
        run: pnpm test:e2e
