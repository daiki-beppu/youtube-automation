name: Publish npm alpha
run-name: Publish tayk@${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "packages/cli/package.json version to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Verify requested version
        run: |
          set -eu
          package_version=$(bun -e 'const pkg = await Bun.file("packages/cli/package.json").json(); console.log(pkg["version"]);')
          if [ "$package_version" != "${{ github.event.inputs.version }}" ]; then
            echo "Requested version ${{ github.event.inputs.version }} does not match packages/cli/package.json \"version\" $package_version"
            exit 1
          fi

      - run: bun run build
        working-directory: packages/cli

      - run: npm publish --provenance --tag alpha
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
