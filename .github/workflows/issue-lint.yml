name: issue-lint

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint issue body
        id: lint
        run: |
          out=$(bash .github/scripts/issue-lint.sh "$GITHUB_EVENT_PATH")
          {
            echo "report<<EOF"
            echo "$out"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert lint comment
        if: steps.lint.outputs.report != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ steps.lint.outputs.report }}
        run: |
          set -eu
          n=${{ github.event.issue.number }}
          marker='<!-- issue-lint -->'
          cid=$(gh api "repos/${{ github.repository }}/issues/$n/comments" --paginate \
            --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id // empty")
          body="$marker
          $REPORT"
          if [ -n "$cid" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$cid" -f body="$body" > /dev/null
          else
            gh api "repos/${{ github.repository }}/issues/$n/comments" -f body="$body" > /dev/null
          fi
