name: CI

on:
  push:
    branches: [main, feat/1143-suno-bulk-download]
  pull_request: {}

# main への push は cancel-in-progress の対象外（デプロイ相当の run を途中で殺さない）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - run: nix develop --command uv sync
      - parallel:
          - name: Ruff check
            run: nix develop --command uv run ruff check .
          - name: Ruff format check
            run: nix develop --command uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Install dependencies
        run: nix develop --command uv sync
      - name: Test
        run: nix develop --command uv run pytest -n auto

  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Frozen sync (lock drift check)
        run: nix develop --command uv sync --frozen
      - name: Build wheel and sdist
        run: nix develop --command uv build
      - name: Smoke test installed wheel downstream sync
        run: |
          candidate_wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          test -n "$candidate_wheel"
          YTA_CANDIDATE_WHEEL="$candidate_wheel" \
            nix develop --command uv run pytest tests/test_skills_sync_installed_wheel.py -q

  takt-workflow-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      # takt は CI 再現性のため pin する。takt を upgrade したらこの pin も bump し、
      # contract テストの red/green で lite workflow との drift を検出する
      - name: Install takt (pinned)
        run: npm install -g takt@0.51.0
      - name: Install dependencies
        run: uv sync
      - name: Workflow doctor (lite)
        run: TAKT_CONFIG_DIR="$PWD/tests/fixtures/takt_global" takt workflow doctor lite
      - name: Lite workflow contract tests
        run: TAKT_LITE_CONTRACT_REQUIRED=1 uv run pytest tests/test_takt_lite_workflow_contract.py -q

  windows-cost-tracker:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync
      - name: Test cost tracker on Windows
        run: uv run pytest tests/test_cost_tracker.py -q

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG update
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          if [[ ",${PR_LABELS}," == *",skip-changelog,"* ]]; then
            echo "skip-changelog label present, skipping CHANGELOG check"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          if ! echo "$changed" | grep -qE '^(src/youtube_automation/|\.claude/skills/|\.claude/CLAUDE\.template\.md$|pyproject\.toml$)'; then
            echo "No significant code changes, skipping CHANGELOG check"
            exit 0
          fi
          if ! echo "$changed" | grep -q '^CHANGELOG\.md$'; then
            echo "::error::CHANGELOG.md must be updated under [Unreleased]. Add an entry or apply 'skip-changelog' label."
            exit 1
          fi
          echo "CHANGELOG.md updated"

  adr-numbering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ADR number uniqueness
        run: |
          set -eu
          dups=$(ls docs/adr | cut -d- -f1 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate ADR numbers found: $dups"
            ls docs/adr | sort
            exit 1
          fi
          echo "ADR numbers are unique"

  any-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check new Any usage
        env:
          PRE_PUSH_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
        run: bash .lefthook/pre-push/any-usage-gate.sh
