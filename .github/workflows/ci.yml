name: CI

on:
  push:
    branches: [main, feat/ts-rewrite, feat/1143-suno-bulk-download]
  pull_request: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - run: nix develop --command uv sync --extra dev
      - parallel:
          - name: Ruff check
            run: nix develop --command uv run ruff check .
          - name: Ruff format check
            run: nix develop --command uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Install dependencies
        run: nix develop --command uv sync --extra dev
      - name: Test
        run: nix develop --command uv run pytest

  windows-cost-tracker:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Test cost tracker on Windows
        run: uv run pytest tests/test_cost_tracker.py -q

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check CHANGELOG update
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          if [[ ",${PR_LABELS}," == *",skip-changelog,"* ]]; then
            echo "skip-changelog label present, skipping CHANGELOG check"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          if ! echo "$changed" | grep -qE '^(src/youtube_automation/|\.claude/skills/|\.claude/CLAUDE\.template\.md$|pyproject\.toml$|packages/|package\.json$)'; then
            echo "No significant code changes, skipping CHANGELOG check"
            exit 0
          fi
          if ! echo "$changed" | grep -q '^CHANGELOG\.md$'; then
            echo "::error::CHANGELOG.md must be updated under [Unreleased]. Add an entry or apply 'skip-changelog' label."
            exit 1
          fi
          echo "CHANGELOG.md updated"

  adr-numbering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ADR number uniqueness
        run: |
          set -eu
          dups=$(ls docs/adr | cut -d- -f1 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate ADR numbers found: $dups"
            ls docs/adr | sort
            exit 1
          fi
          echo "ADR numbers are unique"

  ts-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run lint

  ts-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run format:check

  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  ts-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun test

  ts-knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run knip

# ts-audit (vulnerability scan) は scanner provider (socket.dev 等) の設定とセットで
# 後日別 issue で再導入する。bun pm scan は外部 scanner 必須でゼロ config で動かない
