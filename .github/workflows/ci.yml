name: CI

on:
  push:
    branches: [main]
  pull_request: {}

# main への push は cancel-in-progress の対象外（デプロイ相当の run を途中で殺さない）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.classify.outputs.python }}
      packaging: ${{ steps.classify.outputs.packaging }}
      windows: ${{ steps.classify.outputs.windows }}
      adr: ${{ steps.classify.outputs.adr }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Classify changed paths
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -eu
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
            separator="..."
          else
            base="$PUSH_BEFORE_SHA"
            head="$PUSH_HEAD_SHA"
            separator=".."
          fi
          case "$base" in
            "" | 0000000000000000000000000000000000000000)
              base="${head}^"
              separator=".."
              ;;
          esac
          git diff --name-only "${base}${separator}${head}" > "$RUNNER_TEMP/changed-paths.txt"
          bash .github/scripts/classify-ci-paths.sh "$RUNNER_TEMP/changed-paths.txt" | tee -a "$GITHUB_OUTPUT"

  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: No Python lint required
        if: needs.changes.outputs.python != 'true'
        run: echo "Extension-only change; Python lint is not applicable."
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: needs.changes.outputs.python == 'true'
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        if: needs.changes.outputs.python == 'true'
      - name: Cache uv
        if: needs.changes.outputs.python == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - if: needs.changes.outputs.python == 'true'
        run: nix develop --command uv sync
      - parallel:
          - name: Ruff check
            if: needs.changes.outputs.python == 'true'
            run: nix develop --command uv run ruff check .
          - name: Ruff format check
            if: needs.changes.outputs.python == 'true'
            run: nix develop --command uv run ruff format --check .

  test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: No Python tests required
        if: needs.changes.outputs.python != 'true'
        run: echo "Extension-only change; Python tests are not applicable."
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: needs.changes.outputs.python == 'true'
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        if: needs.changes.outputs.python == 'true'
      - name: Cache uv
        if: needs.changes.outputs.python == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Install dependencies
        if: needs.changes.outputs.python == 'true'
        run: nix develop --command uv sync
      - name: Test
        if: needs.changes.outputs.python == 'true'
        run: nix develop --command uv run pytest -n auto

  build-smoke:
    needs: changes
    if: needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
      - name: Frozen sync (lock drift check)
        run: nix develop --command uv sync --frozen
      - name: Build wheel and sdist
        run: nix develop --command uv build
      - name: Smoke test installed wheel downstream sync
        run: |
          candidate_wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          test -n "$candidate_wheel"
          YTA_CANDIDATE_WHEEL="$candidate_wheel" \
            nix develop --command uv run pytest tests/test_skills_sync_installed_wheel.py -q
      - name: Smoke test installed wheel dashboard
        run: |
          candidate_wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          test -n "$candidate_wheel"
          YTA_CANDIDATE_WHEEL="$candidate_wheel" \
            nix develop --command uv run pytest tests/test_dashboard_packaging.py -q

  windows-cost-tracker:
    needs: changes
    if: needs.changes.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Install dependencies
        run: uv sync
      - name: Test cost tracker on Windows
        run: uv run pytest tests/test_cost_tracker.py -q

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Check CHANGELOG update
        env:
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          if [[ ",${PR_LABELS}," == *",skip-changelog,"* ]]; then
            echo "skip-changelog label present, skipping CHANGELOG check"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          if ! echo "$changed" | grep -qE '^(src/youtube_automation/|\.claude/skills/|\.claude/CLAUDE\.template\.md$|pyproject\.toml$)'; then
            echo "No significant code changes, skipping CHANGELOG check"
            exit 0
          fi
          if ! echo "$changed" | grep -q '^CHANGELOG\.md$'; then
            echo "::error::CHANGELOG.md must be updated under [Unreleased]. Add an entry or apply 'skip-changelog' label."
            exit 1
          fi
          echo "CHANGELOG.md updated"

  adr-numbering:
    needs: changes
    if: needs.changes.outputs.adr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check ADR number uniqueness
        run: |
          set -eu
          dups=$(ls docs/adr | cut -d- -f1 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "::error::Duplicate ADR numbers found: $dups"
            ls docs/adr | sort
            exit 1
          fi
          echo "ADR numbers are unique"

  any-gate:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.changes.outputs.python == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Check new Any usage
        env:
          PRE_PUSH_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
        run: bash .lefthook/pre-push/any-usage-gate.sh
