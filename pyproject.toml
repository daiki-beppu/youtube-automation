[project]
name = "youtube-channels-automation"
version = "1.0.0"
description = "YouTube channel automation toolkit - analytics, AI content generation, and auto-upload"
requires-python = ">=3.11"
license = {text = "MIT"}
readme = "README.md"
authors = [{name = "daiki-beppu"}]
dependencies = [
    "google-api-python-client",
    "google-auth-oauthlib",
    "google-auth-httplib2",
    "python-dotenv",
    "pandas",
    "matplotlib",
    "seaborn",
    "schedule",
]

[project.urls]
Repository = "https://github.com/daiki-beppu/youtube-channels-automation"

[project.optional-dependencies]
dev = ["pytest", "ruff"]
veo = ["google-genai", "Pillow"]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
